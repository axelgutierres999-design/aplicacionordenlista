<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Café App</title>
    <link rel="stylesheet" href="css/style.css"> 
    
    <style>
        /* --- ESTILOS GENERALES --- */
        body { 
            /* Un fondo oscuro hace que la tarjeta blanca resalte más (como en tu referencia) */
            background: #1a1b20; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        /* --- CONTENEDOR PRINCIPAL (La tarjeta dividida) --- */
        .login-container {
            display: flex;
            background: #ffffff;
            width: 90%;
            max-width: 900px;
            border-radius: 20px;
            overflow: hidden; /* Para que la imagen no se salga de las curvas */
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* --- LADO IZQUIERDO: IMAGEN --- */
        .image-overlay {
            flex: 1;
            background-color: #f7e8d5; /* Un tono café con leche claro */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 40px;
        }

        /* Aquí puedes darle estilo al ícono de café que subiste */
        .image-overlay img {
            max-width: 150px;
            margin-bottom: 20px;
        }

        /* --- LADO DERECHO: FORMULARIO --- */
        .login-panel { 
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            background: #ffffff;
        }

        .login-panel h2 { 
            font-size: 2em; 
            margin-bottom: 10px; 
            color: #333; 
            font-weight: 800;
            margin-top: 0;
        }
        
        .login-panel p.subtitle { 
            color: #666; 
            margin-bottom: 30px; 
            font-size: 0.95em;
            margin-top: 0;
        }

        /* --- INPUTS ESTILO FLAT --- */
        .input-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }

        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.85em; 
            color: #666; 
            font-weight: 600;
        }

        .input-group input {
            width: 100%; 
            padding: 12px 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px;
            background: #fafafa; 
            box-sizing: border-box; 
            outline: none;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-color: #6c5ce7; /* Color de acento al seleccionar */
            background: #ffffff;
        }

        /* --- BOTONES --- */
        .btn-login {
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 8px;
            background: #6c5ce7; /* Color morado como en la referencia, puedes cambiarlo */
            color: #fff; 
            font-weight: bold; 
            font-size: 1em;
            margin-top: 10px;
            cursor: pointer; 
            transition: background 0.3s;
        }

        .btn-login:hover {
            background: #5b4bc4;
        }

        .btn-login:disabled { 
            background: #a29bfe; 
            cursor: not-allowed; 
        }

        /* --- MENSAJE DE ERROR (Animado) --- */
        .message {
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            background: #ffeaa7; /* Fondo amarillo suave por defecto */
            color: #d63031;
            animation: slideIn 0.3s ease;
            text-align: center; 
            font-weight: 600;
            display: none; /* Oculto por defecto */
        }

        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .register-link {
            margin-top: 25px; 
            font-size: 13px; 
            color: #888;
            text-align: center;
        }
        
        .register-link a {
            color: #6c5ce7; 
            font-weight: bold; 
            text-decoration: none;
        }

        /* --- RESPONSIVE (Móviles) --- */
        @media (max-width: 768px) {
            .image-overlay { 
                display: none; /* Oculta la imagen en celulares, como pediste en el CSS */
            }
            .login-panel {
                padding: 40px 25px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="image-overlay">
        <img src="tu-icono-de-cafe.png" alt="Icono Café">
        <h3 style="color: #5c4033; margin: 0;">OrdenLista</h3>
        <p style="color: #8b7355; text-align: center; font-size: 0.9em;">Gestiona tus mesas y pedidos</p>
    </div>

    <div class="login-panel">
        <h2>Sign In</h2>
        <p class="subtitle">Ingresa tus credenciales para continuar</p>

        <div class="message" id="alert-msg">Login Failed!</div>

        <form id="login-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="user@domain.com" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login" id="btn-entrar">Sign In</button>
        </form>
        
        <div class="register-link">
            ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/login.js"></script>

</html>
