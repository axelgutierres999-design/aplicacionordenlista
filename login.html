<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Premium Orden Lista</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
    background:#f0f0f3;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    font-family:sans-serif;
}

.login-card{
    background:#f0f0f3;
    padding:35px 25px;
    border-radius:30px;
    box-shadow:20px 20px 60px #d1d9e6,-20px -20px 60px #ffffff;
    width:85%;
    max-width:350px;
    text-align:center;
}

/* Sartén elegante */
.pan{
    width:150px;
    height:150px;
    margin:auto;
    margin-bottom:25px;
    position:relative;
    border-radius:50%;
    background:radial-gradient(circle at center,#2b2b2b,#111);
    box-shadow:
        inset 0 0 20px rgba(255,255,255,.08),
        0 8px 15px rgba(0,0,0,.15);
}

/* mango */
.handle{
    width:80px;
    height:16px;
    background:linear-gradient(90deg,#444,#222);
    position:absolute;
    right:-60px;
    top:67px;
    border-radius:10px;
}

/* clara */
.egg-white{
    width:85px;
    height:85px;
    background:#fff;
    border-radius:50%;
    position:absolute;
    top:33px;
    left:33px;
    box-shadow: inset 0 0 8px rgba(0,0,0,.08);
    transition:1.5s ease;
}

/* yema */
.yolk{
    width:35px;
    height:35px;
    background:radial-gradient(circle,#ffd54f,#ff9800);
    border-radius:50%;
    position:absolute;
    top:24px;
    left:24px;
    transition:1.5s ease;
}

/* cocción */
.cooking .egg-white{
    transform:scale(1.18);
    background:#f7e7b5;
}

.cooking .yolk{
    transform:scale(.85);
    background:radial-gradient(circle,#ffb300,#f57c00);
}

/* vapor */
.steam{
    position:absolute;
    width:14px;
    height:14px;
    border-radius:50%;
    background:rgba(255,255,255,.45);
    top:18px;
    opacity:0;
}

.s1{ left:45px; }
.s2{ left:70px; }
.s3{ left:95px; }

.cooking .steam{
    animation:steam 1.2s infinite;
}

.s2{
    animation-delay:.3s;
}

.s3{
    animation-delay:.6s;
}

@keyframes steam{
    0%{
        opacity:0;
        transform:translateY(0) scale(.4);
    }
    50%{
        opacity:1;
    }
    100%{
        opacity:0;
        transform:translateY(-30px) scale(1.4);
    }
}

/* burbujas */
.bubble{
    position:absolute;
    width:8px;
    height:8px;
    background:rgba(255,255,255,.8);
    border-radius:50%;
    opacity:0;
}

.b1{ top:55px; left:45px; }
.b2{ top:80px; left:95px; }

.cooking .bubble{
    animation:bubble 1s infinite;
}

.b2{
    animation-delay:.5s;
}

@keyframes bubble{
    0%{
        opacity:0;
        transform:scale(.5);
    }
    50%{
        opacity:1;
    }
    100%{
        opacity:0;
        transform:scale(1.5);
    }
}

/* error */
.error{
    animation:shake .4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
    75%{transform:translateX(-6px);}
    100%{transform:translateX(0);}
}

h2{
    color:#333;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:20px;
    text-align:left;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#666;
    margin-left:10px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#f0f0f3;
    box-shadow: inset 6px 6px 12px #d1d9e6,inset -6px -6px 12px #ffffff;
    box-sizing:border-box;
    outline:none;
}

.btn-login{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:black;
    color:white;
    font-weight:bold;
    margin-top:20px;
    cursor:pointer;
}

.btn-login:disabled{
    background:#555;
}
</style>
</head>
<body>

<div class="login-card">

<div class="pan" id="pan">

<div class="handle"></div>

<div class="steam s1"></div>
<div class="steam s2"></div>
<div class="steam s3"></div>

<div class="egg-white">
<div class="yolk"></div>
</div>

<div class="bubble b1"></div>
<div class="bubble b2"></div>

</div>

<h2>Bienvenido</h2>

<form id="login-form">

<div class="input-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="input-group">
<label>Contraseña</label>
<input type="password" id="password" required>
</div>

<button type="submit" class="btn-login" id="btn-entrar">Entrar</button>

</form>

<p style="margin-top:20px;font-size:13px;color:#888;">
¿No tienes cuenta?
<a href="registro.html" style="color:black;font-weight:bold;text-decoration:none;">Regístrate</a>
</p>

</div>

<script>
const supabaseUrl ='https://cpveuexgxwxjejurtwro.supabase.co';
const supabaseKey ='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmV1ZXhneHd4amVqdXJ0d3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MTYxMzAsImV4cCI6MjA4MjE5MjEzMH0.I4FeC3dmtOXNqLWA-tRgxAb7JCe13HysOkqMGkXaUUc';

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

const pan = document.getElementById('pan');
const btn = document.getElementById('btn-entrar');

document.getElementById('login-form').addEventListener('submit', async function(e){

    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    btn.textContent = "Cocinando...";
    btn.disabled = true;

    pan.classList.remove('error');
    pan.classList.add('cooking');

    await new Promise(resolve => setTimeout(resolve, 1800));

    try{

        const { error } = await supabase.auth.signInWithPassword({
            email,
            password
        });

        if(error) throw error;

        window.location.href='index.html';

    }catch(err){

        pan.classList.remove('cooking');
        pan.classList.add('error');

        btn.textContent = "Entrar";
        btn.disabled = false;

        alert(err.message);
    }

});
</script>

</body>
</html>
