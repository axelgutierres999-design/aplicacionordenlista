<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Interactivo</title>

<style>
body{
    background:#f0f0f3;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    font-family:sans-serif;
}

.login-card{
    background:#f0f0f3;
    padding:40px 30px;
    border-radius:30px;
    box-shadow:20px 20px 60px #d1d9e6,-20px -20px 60px #ffffff;
    width:85%;
    max-width:350px;
    text-align:center;
}

/* Sartén */
.pan{
    width:140px;
    height:140px;
    background:#222;
    border-radius:50%;
    margin:auto;
    position:relative;
    margin-bottom:25px;
    box-shadow: inset 0 0 15px rgba(255,255,255,.1);
}

.handle{
    width:70px;
    height:18px;
    background:#444;
    position:absolute;
    right:-55px;
    top:60px;
    border-radius:10px;
}

/* Clara */
.egg-white{
    width:80px;
    height:80px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:30px;
    left:30px;
    transition:1.5s ease;
}

/* Yema */
.yolk{
    width:35px;
    height:35px;
    background:#ffcc00;
    border-radius:50%;
    position:absolute;
    top:22px;
    left:22px;
    transition:1.5s ease;
}

/* Cocción */
.cooking .egg-white{
    transform:scale(1.1);
    background:#f5f5dc;
}

.cooking .yolk{
    background:#ff9900;
    transform:scale(.9);
}

/* Error */
.error{
    animation:shake .4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

h2{
    color:#333;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
    text-align:left;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#f0f0f3;
    box-shadow: inset 6px 6px 12px #d1d9e6,inset -6px -6px 12px #ffffff;
    box-sizing:border-box;
}

.btn-login{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:black;
    color:white;
    font-weight:bold;
    margin-top:20px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="login-card">

<div class="pan" id="pan">
    <div class="handle"></div>
    <div class="egg-white">
        <div class="yolk"></div>
    </div>
</div>

<h2>Bienvenido</h2>

<form id="login-form">

<div class="input-group">
<input type="email" id="email" placeholder="tu@email.com" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="••••••••" required>
</div>

<button type="submit" class="btn-login" id="btn-entrar">Entrar</button>

</form>

</div>

<script>
const pan=document.getElementById('pan');

document.getElementById('login-form').addEventListener('submit',function(e){

    e.preventDefault();

    pan.classList.add('cooking');

    setTimeout(()=>{

        const ok=true; // aquí conectas Supabase

        if(ok){
            window.location.href='index.html';
        }else{
            pan.classList.remove('cooking');
            pan.classList.add('error');
        }

    },1500);

});
</script>

</body>
</html>
