<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dashboard | Mi Nutrición</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #f4f5f8; 
            --dark: #1d1d1f; 
            --accent: #000000; 
            --prot: #ff4d4d; 
            --carb: #ff9f0a; 
            --fat: #32ade6;
            --water: #32ade6;
            --success: #34c759;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--dark); }

        /* Header */
        .header { padding: 50px 20px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(244,245,248,0.9); backdrop-filter: blur(10px); z-index: 100; }
        
        /* Tarjetas Estilo App */
        .card { background: white; margin: 15px 20px; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* Resumen de Calorías */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-box { flex: 1; }
        .cal-box.right { text-align: right; border-left: 1px solid #eee; padding-left: 15px; }
        .cal-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 5px; }
        .cal-value { font-size: 28px; font-weight: 800; }
        .text-success { color: var(--success); }
        .text-danger { color: var(--prot); }

        /* Barra de Progreso */
        .progress-bar-container { width: 100%; height: 14px; background: #eee; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--success); width: 0%; transition: all 0.5s ease; border-radius: 10px; }
        .progress-bar-fill.over-limit { background: var(--prot); }

        /* Grid de Macros */
        .macros-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .macro-item { background: var(--bg); padding: 12px; border-radius: 20px; text-align: center; }
        .macro-val { font-weight: 800; font-size: 16px; display: block; }
        .macro-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; display: block;}

        /* Widget de Hidratación */
        .water-widget { display: flex; justify-content: space-between; align-items: center; }
        .water-info { display: flex; align-items: center; gap: 15px; }
        .water-icon { font-size: 32px; background: rgba(50, 173, 230, 0.1); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 20px; }
        .water-btn { background: var(--water); color: white; border: none; padding: 12px 20px; border-radius: 20px; font-weight: 800; font-size: 15px; cursor: pointer; box-shadow: 0 4px 15px rgba(50, 173, 230, 0.3); transition: transform 0.1s; }
        .water-btn:active { transform: scale(0.95); }

        /* Lista Compacta de Alimentos */
        .compact-list { margin-top: 15px; }
        .compact-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .compact-item:last-child { border-bottom: none; }
        .compact-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 10px; }
        .compact-cal { font-weight: 800; font-size: 15px; color: #666; }

        /* Menú de Navegación Inferior */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 20px 25px; display: flex; justify-content: space-around; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; border-radius: 30px 30px 0 0; }
        .nav-item { text-align: center; color: #888; text-decoration: none; font-size: 12px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: var(--dark); }
        .nav-icon { font-size: 24px; }

        /* Pantalla de Carga */
        #loading-overlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { font-size: 50px; animation: spin 1.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner">🔄</div>
        <p style="font-weight: bold; margin-top: 20px; color: #666;">Sincronizando datos...</p>
    </div>

    <header class="header">
        <h2 style="margin: 0; font-weight: 800;">Resumen del Día</h2>
        <div style="font-weight: 700; color: #888; font-size: 14px;" id="fecha-hoy">Hoy</div>
    </header>

    <div class="card">
        <div class="cal-header">
            <div class="cal-box">
                <div class="cal-label">Consumidas</div>
                <div class="cal-value" id="cal-consumidas">0</div>
            </div>
            <div class="cal-box right">
                <div class="cal-label">Restantes</div>
                <div class="cal-value text-success" id="cal-restantes">0</div>
            </div>
        </div>

        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="cal-progress"></div>
        </div>

        <div class="macros-grid">
            <div class="macro-item">
                <span class="macro-val" id="total-prot" style="color: var(--prot);">0g</span>
                <span class="macro-label">Proteína</span>
            </div>
            <div class="macro-item">
                <span class="macro-val" id="total-carbs" style="color: var(--carb);">0g</span>
                <span class="macro-label">Carbs</span>
            </div>
            <div class="macro-item">
                <span class="macro-val" id="total-fats" style="color: var(--fat);">0g</span>
                <span class="macro-label">Grasas</span>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="water-widget">
            <div class="water-info">
                <div class="water-icon">💧</div>
                <div>
                    <div style="font-weight: 800; font-size: 16px;">Hidratación</div>
                    <div style="font-size: 13px; color: #888; margin-top: 4px;">
                        <span id="agua-actual" style="font-weight: 800; color: var(--dark); font-size: 15px;">0</span> 
                        / <span id="agua-meta">2.5</span> Litros
                    </div>
                </div>
            </div>
            <button class="water-btn" onclick="agregarAgua(0.25)">+ 250 ml</button>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top: 0; font-size: 18px;">Comidas Registradas</h3>
        <div class="compact-list" id="lista-compacta">
            </div>
    </div>

    <nav class="bottom-nav">
        <a href="dietahtml.txt" class="nav-item">
            <span class="nav-icon">📸</span>
            <span>Registro</span>
        </a>
        <a href="#" class="nav-item active">
            <span class="nav-icon">📊</span>
            <span>Dashboard</span>
        </a>
    </nav>

    <script>
        // 1. CONFIGURACIÓN SUPABASE (Exactamente igual que tu archivo principal)
        const urlDB = 'https://cpveuexgxwxjejurtwro.supabase.co';
        const keyDB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmV1ZXhneHd4amVqdXJ0d3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MTYxMzAsImV4cCI6MjA4MjE5MjEzMH0.I4FeC3dmtOXNqLWA-tRgxAb7JCe13HysOkqMGkXaUUc'; 
        const supabaseClient = window.supabase.createClient(urlDB, keyDB);

        // 2. VARIABLES DE ESTADO
        let totales = { cal: 0, prot: 0, carbs: 0, fats: 0 };
        // Leemos la meta que configuró el usuario en la otra pantalla (o 2000 por defecto)
        let metaCalorias = localStorage.getItem('metaCalorias') || 2000; 
        
        // Lógica para guardar el agua del día en localStorage
        const hoyString = new Date().toLocaleDateString('es-MX');
        const aguaKey = `agua_${hoyString}`;
        let aguaConsumida = parseFloat(localStorage.getItem(aguaKey)) || 0;
        const metaAgua = 2.5;

        // 3. INICIALIZACIÓN
        window.addEventListener('DOMContentLoaded', async () => {
            // Mostrar fecha
            const opcionesFecha = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('fecha-hoy').innerText = new Date().toLocaleDateString('es-MX', opcionesFecha);
            
            // Cargar datos
            await cargarDatosHoy();
            actualizarUI();
            
            // Ocultar pantalla de carga
            document.getElementById('loading-overlay').style.display = 'none';
        });

        // 4. CARGAR DATOS DE SUPABASE
        async function cargarDatosHoy() {
            const fecha = new Date();
            const inicioDia = new Date(fecha); inicioDia.setHours(0, 0, 0, 0);
            const finDia = new Date(fecha); finDia.setHours(23, 59, 59, 999);

            try {
                const { data, error } = await supabaseClient
                    .from('registros_dieta')
                    .select('nombre_alimento, calorias, proteinas, carbohidratos, grasas')
                    .gte('creado_at', inicioDia.toISOString())
                    .lte('creado_at', finDia.toISOString())
                    .order('creado_at', { ascending: false });

                if (error) throw error;

                const contenedorLista = document.getElementById('lista-compacta');
                contenedorLista.innerHTML = '';

                if (data && data.length > 0) {
                    data.forEach(item => {
                        // Sumar totales
                        totales.cal += item.calorias;
                        totales.prot += item.proteinas;
                        totales.carbs += item.carbohidratos;
                        totales.fats += item.grasas;

                        // Renderizar lista compacta
                        contenedorLista.innerHTML += `
                            <div class="compact-item">
                                <div class="compact-name">🍽️ ${item.nombre_alimento}</div>
                                <div class="compact-cal">${item.calorias} <span style="font-size:11px; font-weight:normal;">kcal</span></div>
                            </div>
                        `;
                    });
                } else {
                    contenedorLista.innerHTML = `<div style="text-align:center; padding: 20px; color: #888;">No has registrado comidas hoy.</div>`;
                }
            } catch (err) {
                console.error("Error cargando dashboard:", err);
            }
        }

        // 5. ACTUALIZAR INTERFAZ Y CÁLCULOS
        function actualizarUI() {
            // Cálculos de Calorías
            const calRestantes = metaCalorias - totales.cal;
            
            document.getElementById('cal-consumidas').innerText = totales.cal;
            
            const divRestantes = document.getElementById('cal-restantes');
            divRestantes.innerText = calRestantes > 0 ? calRestantes : 0;

            // Manejo de colores si se pasa de la meta
            if (calRestantes < 0) {
                divRestantes.classList.remove('text-success');
                divRestantes.classList.add('text-danger');
            } else {
                divRestantes.classList.add('text-success');
                divRestantes.classList.remove('text-danger');
            }

            // Barra de Progreso
            const porcentaje = (totales.cal / metaCalorias) * 100;
            const barra = document.getElementById('cal-progress');
            barra.style.width = Math.min(porcentaje, 100) + '%';
            if (porcentaje > 100) barra.classList.add('over-limit');

            // Macros
            document.getElementById('total-prot').innerText = totales.prot.toFixed(1) + 'g';
            document.getElementById('total-carbs').innerText = totales.carbs.toFixed(1) + 'g';
            document.getElementById('total-fats').innerText = totales.fats.toFixed(1) + 'g';

            // Agua
            document.getElementById('agua-actual').innerText = aguaConsumida.toFixed(2);
            document.getElementById('agua-meta').innerText = metaAgua;
        }

        // 6. FUNCIÓN DE AGUA
        function agregarAgua(cantidad) {
            aguaConsumida += cantidad;
            aguaConsumida = Math.round(aguaConsumida * 100) / 100; // Evitar decimales largos
            localStorage.setItem(aguaKey, aguaConsumida); // Guardar progreso localmente
            actualizarUI();
        }
    </script>
</body>
</html>
