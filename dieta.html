<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Salud y Dieta AI</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #f4f5f8; --dark: #1d1d1f; --accent: #000000; 
            --prot: #ff4d4d; --carb: #ff9f0a; --fat: #32ade6; 
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--dark); }

        /* Header */
        .header { padding: 50px 20px 20px; text-align: center; position: sticky; top: 0; background: rgba(244,245,248,0.9); backdrop-filter: blur(10px); z-index: 100; }
        
        /* Dashboard Totales */
        .card-calories { background: white; margin: 20px; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .progress-circle { font-size: 36px; font-weight: 800; margin: 10px 0; }
        .macros-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .macro-item { background: var(--bg); padding: 10px; border-radius: 15px; }
        .macro-val { font-weight: 800; font-size: 16px; display: block; }
        .macro-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px;}

        /* Lista de Alimentos (Estilo Cal AI) */
        .food-item { background: white; margin: 15px 20px; padding: 20px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .food-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .food-title { font-weight: 700; font-size: 16px; }
        .food-cal { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        
        /* Chips de Macros */
        .chips-container { display: flex; gap: 10px; }
        .macro-chip { flex: 1; padding: 10px; border-radius: 16px; border: 1px solid #eee; text-align: left; }
        .chip-label { font-size: 11px; color: #888; display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
        .chip-val { font-weight: 700; font-size: 14px; }

        /* Botones Flotantes */
        .action-buttons { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 1000; }
        .btn-round { width: 60px; height: 60px; border-radius: 30px; border: none; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.15); transition: transform 0.2s; }
        .btn-round:active { transform: scale(0.95); }
        .cam-btn { background: var(--accent); color: white; width: 80px; }
        .text-btn { background: white; color: var(--dark); }
        .coach-btn { background: #5856d6; color: white; }

        /* Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 2000; justify-content: center; align-items: flex-end; }
        .modal-content { 
             background: white; 
             width: 100%; 
             padding: 30px; 
             border-radius: 30px 30px 0 0; 
              animation: slideUp 0.3s ease-out; 
             max-height: 85vh; /* Evita que el fondo blanco pase del 85% de la pantalla */
              display: flex;
            flex-direction: column;
        }       
         @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 15px; background: var(--bg); outline: none; font-size: 16px; }
        .primary-btn { width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 15px; background: var(--accent); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Pantalla de Carga */
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { font-size: 50px; animation: spin 1.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Selector de Días */
        .days-container {
          display: flex;
          overflow-x: auto;
         padding: 10px 20px;
         gap: 15px;
         scrollbar-width: none; /* Ocultar scroll en Firefox */
}
.days-container::-webkit-scrollbar { display: none; } /* Ocultar scroll en Chrome/Safari */

.day-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 55px;
    padding: 12px 10px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    cursor: pointer;
    transition: all 0.3s ease;
    border: 2px solid transparent;
}

.day-item.active {
    background: var(--accent);
    color: white;
    transform: scale(1.05);
}

.day-name { font-size: 11px; text-transform: uppercase; margin-bottom: 5px; opacity: 0.7; }
.day-number { font-weight: 800; font-size: 16px; }

/* Selector de Estilo de Vida */
.lifestyle-container { text-align: center; margin: 10px 20px; }
.lifestyle-select { 
    background: white; 
    border: none; 
    padding: 10px 20px; 
    border-radius: 20px; 
    font-weight: 700; 
    font-size: 14px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
    outline: none; 
    cursor: pointer; 
    color: var(--dark); 
}
/* Corrección y adiciones para la tarjeta */
.food-item { 
    position: relative; /* Permite posicionar el botón de borrado en la esquina */
    background: white; 
    margin: 15px 20px; 
    padding: 20px; 
    border-radius: 25px; 
    box-shadow: 0 5px 15px rgba(0,0,0,0.03); 
    overflow: hidden; 
}

/* Pestaña ligera de eliminación en la esquina superior derecha */
.btn-delete {
    position: absolute;
    top: 0;
    right: 0;
    background: #ff4d4d;
    color: white;
    border: none;
    border-radius: 0 25px 0 20px;
    width: 40px;
    height: 40px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    transition: background 0.2s;
    z-index: 10;
}
.btn-delete:active { background: #dd3333; }

/* Contenedor de la foto dentro de la tarjeta */
.food-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 18px;
    margin-bottom: 15px;
    display: block;
}
    </style>
</head>
<body>

    <header class="header">
        <h2 style="margin: 0; font-weight: 800;">Mi Nutrición</h2>
    </header>

    <!-- Selector de Días de la Semana -->
    <div class="days-container" id="days-selector"></div>

    <!-- Selector de Estilo de Vida -->
    <div class="lifestyle-container">
        <select id="estilo-vida" class="lifestyle-select" onchange="cambiarEstiloVida()">
            <option value="2000"> Sedentario (1600 - 2000 kcal)</option>
            <option value="2500"> Moderado (2500 kcal)</option>
            <option value="3000"> Activo (2800 - 3000 kcal)</option>
        </select>
    </div>

    <!-- Tarjeta Dashboard Totales -->
    <div class="card-calories">
        <div style="font-size: 14px; color: #888;">Calorías Consumidas</div>
        <div class="progress-circle" id="total-calories">0 <span style="font-size: 16px; color: #aaa; font-weight: 500;">/ 2500 kcal</span></div>
        
        <div class="macros-grid">
            <div class="macro-item">
                <span class="macro-val" id="total-prot" style="color: var(--prot);">0g</span>
                <span class="macro-label">Proteína</span>
            </div>
            <div class="macro-item">
                <span class="macro-val" id="total-carbs" style="color: var(--carb);">0g</span>
                <span class="macro-label">Carbs</span>
            </div>
            <div class="macro-item">
                <span class="macro-val" id="total-fats" style="color: var(--fat);">0g</span>
                <span class="macro-label">Grasas</span>
            </div>
        </div>
    </div>

    <!-- Lista de Platillos -->
    <!-- Lista de Platillos -->
    <div id="food-list">
        <!-- Los items se cargarán aquí -->
    </div>

    <!-- Botones Flotantes -->
    <div class="action-buttons">
        <button class="btn-round text-btn" onclick="openModal('text-modal')">✍️</button>
        <button class="btn-round cam-btn" onclick="document.getElementById('camera-input').click()">📸</button>
        <button class="btn-round coach-btn" onclick="pedirConsejoCoach()">🧠</button>
    </div>

    <!-- Inputs Ocultos -->
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">

    <!-- Modal de Texto IA -->
    <div id="text-modal" class="modal" onclick="closeModal(event, 'text-modal')">
        <div class="modal-content">
            <h3 style="margin-top:0;">Buscar con IA</h3>
            <p style="font-size: 14px; color: #666;">Describe lo que comiste y su peso aproximado.</p>
            <input type="text" id="ai-food-name" placeholder="Ej: Dos rebanadas de pan con aguacate">
            <input type="text" id="ai-food-weight" placeholder="Peso o cantidad (Ej: 150g o 1 porción)">
            <button class="primary-btn" onclick="analizarTextoIA()">Analizar y Guardar</button>
        </div>
    </div>

<!-- Modal Coach -->
    <div id="coach-modal" class="modal" onclick="closeModal(event, 'coach-modal')">
        <div class="modal-content">
            <h3 style="margin-top:0;">👨‍⚕️ Coach Metabólico</h3>
            
            <!-- Aquí agregamos el max-height, overflow-y y un poco de padding para que se vea limpio -->
            <div id="coach-response" style="line-height: 1.5; color: #444; min-height: 100px; max-height: 50vh; overflow-y: auto; padding-right: 10px; margin-bottom: 10px;">
                Analizando tu ingesta del día...
            </div>
            
            <button class="primary-btn" onclick="document.getElementById('coach-modal').style.display='none'">Entendido</button>
        </div>
    </div>

    <!-- Overlay de Carga -->
    <div id="loading-overlay">
        <div class="spinner">⏳</div>
        <p style="font-weight: bold; margin-top: 20px;" id="loading-text">Analizando alimento...</p>
    </div>
    
<div id="receta-modal" class="modal" onclick="closeModal(event, 'receta-modal')">
    <div class="modal-content" style="max-height: 90vh;">
        <h3 id="receta-titulo" style="margin-top:0; color:var(--accent);">Analizando Receta...</h3>
        
        <div id="receta-cuerpo" style="overflow-y: auto; font-size: 14px; line-height: 1.6;">
            </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="primary-btn" id="btn-save-recipe" style="background:#5856d6; flex: 1;">💾 Guardar en Recetario</button>
            <button class="primary-btn" onclick="document.getElementById('receta-modal').style.display='none'" style="background:#ccc; color:black; flex: 1;">Cerrar</button>
        </div>
    </div>
</div>
<script>
    // 1. CONFIGURACIÓN SUPABASE (Nombre cambiado para evitar el "already declared")
    const urlDB = 'https://cpveuexgxwxjejurtwro.supabase.co';
    const keyDB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmV1ZXhneHd4amVqdXJ0d3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MTYxMzAsImV4cCI6MjA4MjE5MjEzMH0.I4FeC3dmtOXNqLWA-tRgxAb7JCe13HysOkqMGkXaUUc'; 
    
    // Usamos supabaseClient para que no choque con la palabra 'supabase' de la librería
    const supabaseClient = window.supabase.createClient(urlDB, keyDB);

    let totales = { cal: 0, prot: 0, carbs: 0, fats: 0 };
    let listaAlimentosHoy = []; 
let fechaSeleccionada = new Date(); // Por defecto hoy
let metaCalorias = localStorage.getItem('metaCalorias') || 2000; // NUEVO

// 2. CARGA INICIAL Y GENERADOR DE DÍAS
window.addEventListener('pageshow', async () => {
    document.getElementById('estilo-vida').value = metaCalorias; // NUEVO
    generarSelectorDias();
    await cargarDatosDelDia(new Date());
});

// NUEVA FUNCIÓN
function cambiarEstiloVida() {
    metaCalorias = document.getElementById('estilo-vida').value;
    localStorage.setItem('metaCalorias', metaCalorias); // Guarda en el celular/navegador
    actualizarUI(); // Refresca los números inmediatamente
}

function generarSelectorDias() {
    const selector = document.getElementById('days-selector');
    selector.innerHTML = '';
    const nombresDias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
    const hoy = new Date();

    // Generamos los últimos 7 días
    for (let i = 6; i >= 0; i--) {
        const fecha = new Date();
        fecha.setDate(hoy.getDate() - i);
        
        const dayDiv = document.createElement('div');
        dayDiv.className = `day-item ${i === 0 ? 'active' : ''}`;
        dayDiv.onclick = (e) => seleccionarDia(e.currentTarget, fecha);

        dayDiv.innerHTML = `
            <span class="day-name">${nombresDias[fecha.getDay()]}</span>
            <span class="day-number">${fecha.getDate()}</span>
        `;
        selector.appendChild(dayDiv);
    }
}

async function seleccionarDia(elemento, fecha) {
    // UI: Cambiar clase activa
    document.querySelectorAll('.day-item').forEach(d => d.classList.remove('active'));
    elemento.classList.add('active');
    
    // Lógica: Cargar datos
    fechaSeleccionada = fecha;
    await cargarDatosDelDia(fecha);
}

async function cargarDatosDelDia(fecha) {
    // Reset de la UI
    totales = { cal: 0, prot: 0, carbs: 0, fats: 0 };
    listaAlimentosHoy = [];
    document.getElementById('food-list').innerHTML = '';
    mostrarCarga(true, "Cargando registros...");

    // Definir el rango del día (de 00:00:00 a 23:59:59)
    const inicioDia = new Date(fecha);
    inicioDia.setHours(0, 0, 0, 0);
    const finDia = new Date(fecha);
    finDia.setHours(23, 59, 59, 999);

    try {
        const { data, error } = await supabaseClient
            .from('registros_dieta')
            .select('*')
            .gte('creado_at', inicioDia.toISOString())
            .lte('creado_at', finDia.toISOString())
            .order('creado_at', { ascending: false });

        if (error) throw error;
        
        if (data) {
            data.forEach(item => renderizarPlatillo(item));
        }
        actualizarUI(); // Asegurar que si el día está vacío, los totales bajen a 0
    } catch (err) {
        console.error("Error:", err);
    } finally {
        mostrarCarga(false);
    }
}

    // 3. ANÁLISIS DE IMAGEN (📸)
    document.getElementById('camera-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        mostrarCarga(true, "La IA está analizando tu foto...");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const dataURL = reader.result; // Base64 completo con prefijo data:image...
            const base64Solo = dataURL.split(',')[1];
            try {
                const { data, error } = await supabaseClient.functions.invoke('chef-ia', {
                    body: { tipo: 'imagen', imagenBase64: base64Solo }
                });
                if (error) throw error;
                // Enviamos los datos de la IA junto con la imagen stringificada para guardarla
                await guardarEnBD(data, dataURL);
            } catch (err) {
                alert("Error con la foto: " + err.message);
            } finally {
                mostrarCarga(false);
                document.getElementById('camera-input').value = ''; 
            }
        };
    });

    // 4. ANÁLISIS DE TEXTO (✍️)
    async function analizarTextoIA() {
        const nombre = document.getElementById('ai-food-name').value;
        const peso = document.getElementById('ai-food-weight').value;
        if (!nombre) return alert("Por favor ingresa qué comiste.");

        document.getElementById('text-modal').style.display = 'none';
        mostrarCarga(true, "Calculando macros...");

        try {
            const { data, error } = await supabaseClient.functions.invoke('chef-ia', {
                body: { tipo: 'texto', alimento: nombre, cantidad: peso }
            });
            if (error) throw error;
            await guardarEnBD(data);
            
            document.getElementById('ai-food-name').value = '';
            document.getElementById('ai-food-weight').value = '';
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            mostrarCarga(false);
        }
    }

    // 5. GUARDAR Y RENDERIZAR
async function guardarEnBD(infoIA, fotoBase64 = null) {
    const { data: { user } } = await supabaseClient.auth.getUser();

    if (!user) {
        alert("Debes iniciar sesión para guardar alimentos.");
        return;
    }

    const nuevoRegistro = {
        usuario_id: user.id,
        nombre_alimento: infoIA.nombre_alimento,
        calorias: parseInt(infoIA.calorias) || 0,
        proteinas: parseFloat(infoIA.proteinas) || 0,
        carbohidratos: parseFloat(infoIA.carbohidratos) || 0,
        grasas: parseFloat(infoIA.grasas) || 0,
        imagen_url: fotoBase64 // Guarda la cadena Base64 de la imagen en Supabase
    };

    const { data, error } = await supabaseClient
        .from('registros_dieta')
        .insert([nuevoRegistro])
        .select();

    if (error) {
        console.error("Detalle del error:", error);
        alert("Error al guardar: " + error.message);
    } else {
        renderizarPlatillo(data[0]);
    }
}

function renderizarPlatillo(item) {
        totales.cal += item.calorias;
        totales.prot += item.proteinas;
        totales.carbs += item.carbohidratos;
        totales.fats += item.grasas;
        listaAlimentosHoy.push(item.nombre_alimento);

        const div = document.createElement('div');
    div.className = 'food-item';
    
    const imgElement = item.imagen_url ? `<img src="${item.imagen_url}" class="food-img" alt="Alimento">` : '';

    div.innerHTML = `
        <button class="btn-delete" onclick="eliminarPlatillo('${item.id}', ${item.calorias}, ${item.proteinas}, ${item.carbohidratos}, ${item.grasas}, '${item.nombre_alimento.replace(/'/g, "\\'")}', this)">✕</button>
        ${imgElement}
        <div class="food-header">
            <div class="food-title">${item.nombre_alimento}</div>
            <div class="food-cal">🔥 ${item.calorias} kcal</div>
        </div>
        <div class="chips-container">
            <div class="macro-chip">
                <div class="chip-label"><span style="color:var(--prot)">●</span> Prot</div>
                <div class="chip-val">${item.proteinas}g</div>
            </div>
            <div class="macro-chip">
                <div class="chip-label"><span style="color:var(--carb)">●</span> Carb</div>
                <div class="chip-val">${item.carbohidratos}g</div>
            </div>
            <div class="macro-chip">
                <div class="chip-label"><span style="color:var(--fat)">●</span> Gras</div>
                <div class="chip-val">${item.grasas}g</div>
            </div>
        </div>
        <button onclick="obtenerRecetaIA('${item.nombre_alimento.replace(/'/g, "\\'")}')" 
                style="width:100%; margin-top:12px; padding:8px; border-radius:12px; border:1px solid #eee; background:none; font-size:12px; font-weight:600; cursor:pointer; color:#5856d6;">
            🍳 Ver receta y alternativa saludable
        </button>
    `;
    document.getElementById('food-list').prepend(div);
    actualizarUI();
}

   function actualizarUI() {
    // Reemplazamos el / 2000 kcal fijo por la variable dinámica
    document.getElementById('total-calories').innerHTML = `${totales.cal} <span style="font-size: 16px; color: #aaa; font-weight:500;">/ ${metaCalorias} kcal</span>`;
    document.getElementById('total-prot').innerText = totales.prot.toFixed(1) + 'g';
    document.getElementById('total-carbs').innerText = totales.carbs.toFixed(1) + 'g';
    document.getElementById('total-fats').innerText = totales.fats.toFixed(1) + 'g';
}

    // 6. COACH METABÓLICO (🧠)
async function pedirConsejoCoach() {
    if (listaAlimentosHoy.length === 0) return alert("Por favor, registra al menos un alimento para poder darte un consejo.");
    
    document.getElementById('coach-modal').style.display = 'flex';
    // Textos actualizados para ser más amigables
    document.getElementById('coach-response').innerHTML = `
        <div style="text-align: center; color: #666;">
            <p>⏳ Analizando tus comidas...</p>
            <p style="font-size: 12px;">Preparando tu recomendación ideal...</p>
        </div>
    `;

    try {
        const { data, error } = await supabaseClient.functions.invoke('chef-ia', {
            body: { 
                tipo: 'coach',
                resumen_nutricional: {
                    total_calorias: totales.cal,
                    macros: { 
                        p: totales.prot.toFixed(1), 
                        c: totales.carbs.toFixed(1), 
                        g: totales.fats.toFixed(1) 
                    },
                    lista_detallada: listaAlimentosHoy 
                }
            }
        });
        
        if (error) throw error;
        
        document.getElementById('coach-response').innerHTML = data.recomendacion;
        
    } catch (err) {
        document.getElementById('coach-response').innerHTML = `
            <div style="color: #d9534f; padding: 10px; border-left: 4px solid #d9534f; background: #fdf0ef;">
                <b>Hubo un problema de conexión:</b> ${err.message}
            </div>
        `;
    }
}

    // 7. UTILIDADES DE INTERFAZ (Para que openModal funcione)
    function openModal(id) { 
        document.getElementById(id).style.display = 'flex'; 
    }
    
    function closeModal(e, id) { 
        if(e.target.id === id) document.getElementById(id).style.display = 'none'; 
    }
    
    function mostrarCarga(mostrar, texto = "") { 
        const overlay = document.getElementById('loading-overlay');
        if(overlay) {
            overlay.style.display = mostrar ? 'flex' : 'none';
            if(texto) document.getElementById('loading-text').innerText = texto;
        }
    }
    // funcion para borrar el plato
    async function eliminarPlatillo(id, cal, prot, carbs, fats, nombre, boton) {
    if (!confirm(`¿Deseas eliminar "${nombre}" de tu registro diario?`)) return;

    mostrarCarga(true, "Eliminando alimento...");
    try {
        const { error } = await supabaseClient
            .from('registros_dieta')
            .delete()
            .eq('id', id);

        if (error) throw error;

        // Descontar valores de los totales globales de la pantalla
        totales.cal -= cal;
        totales.prot -= prot;
        totales.carbs -= carbs;
        totales.fats -= fats;

        // Quitar del registro plano de nombres del día
        const index = listaAlimentosHoy.indexOf(nombre);
        if (index > -1) listaAlimentosHoy.splice(index, 1);

        // Desvanecer el elemento de la interfaz de usuario
        const tarjeta = boton.closest('.food-item');
        if (tarjeta) tarjeta.remove();

        actualizarUI();
    } catch (err) {
        alert("No se pudo eliminar de la base de datos: " + err.message);
    } finally {
        mostrarCarga(false);
    }
}
let recetaActualData = null; // Guardamos la respuesta de la IA

async function obtenerRecetaIA(nombre) {
    document.getElementById('receta-modal').style.display = 'flex';
    document.getElementById('receta-titulo').innerText = nombre;
    document.getElementById('receta-cuerpo').innerHTML = "<p>⌛ El Chef IA está buscando la mejor receta...</p>";
    
    try {
        const { data, error } = await supabaseClient.functions.invoke('chef-ia', {
            body: { tipo: 'receta', alimento: nombre }
        });
        
        if (error) throw error;
        recetaActualData = data;

        document.getElementById('receta-cuerpo').innerHTML = `
            <div style="background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:15px;">
                <h4 style="margin:0 0 10px 0; color:#ff4d4d;">🍳 Receta Original</h4>
                <p><b>Ingredientes:</b> ${data.original.ingredientes.join(', ')}</p>
                <p>${data.original.pasos}</p>
            </div>
            
            <div style="background:#e0fdf5; padding:15px; border-radius:15px; border-left:5px solid #10ad93;">
                <h4 style="margin:0 0 10px 0; color:#10ad93;">🌿 Alternativa Saludable: ${data.saludable.titulo}</h4>
                <p><b>Cambios:</b> ${data.saludable.ingredientes.join(', ')}</p>
                <p>${data.saludable.pasos}</p>
                <p style="font-weight:bold; font-size:12px;">📈 ${data.comparativa}</p>
            </div>

            <div style="margin-top:15px; display:flex; gap:10px;">
                <a href="${data.link_youtube}" target="_blank" style="text-decoration:none; background:#ff0000; color:white; padding:10px; border-radius:10px; flex:1; text-align:center; font-size:12px;">📺 Ver Video</a>
                <a href="${data.link_google}" target="_blank" style="text-decoration:none; background:#4285f4; color:white; padding:10px; border-radius:10px; flex:1; text-align:center; font-size:12px;">🔍 Más Info</a>
            </div>
        `;

        document.getElementById('btn-save-recipe').onclick = () => guardarEnRecetario(data);

    } catch (err) {
        document.getElementById('receta-cuerpo').innerHTML = "<p>❌ Error al obtener receta: " + err.message + "</p>";
    }
}

async function guardarEnRecetario(dataIA) {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return alert("Inicia sesión.");

    const { error } = await supabaseClient.from('recetario_usuario').insert([{
        usuario_id: user.id,
        nombre_platillo: document.getElementById('receta-titulo').innerText,
        tipo_receta: 'Saludable / Sustituida',
        ingredientes: dataIA.saludable.ingredientes.join(', '),
        instrucciones: dataIA.saludable.pasos,
        link_busqueda: dataIA.link_youtube
    }]);

    if (error) alert("Error: " + error.message);
    else alert("✅ ¡Receta guardada en tu recetario!");
}
