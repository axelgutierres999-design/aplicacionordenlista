<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Salud y Dieta - OrdenLista</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f0f0f3; --dark: #2c2c2e; --accent: #4caf50; }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 80px; }

        /* Header */
        .header { padding: 50px 20px 20px; text-align: center; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .back-btn { position: absolute; left: 20px; top: 50px; background: var(--bg); border: none; padding: 12px; border-radius: 50%; box-shadow: 4px 4px 10px #d1d9e6, -4px -4px 10px #ffffff; cursor: pointer; }

        /* Calorie Card */
        .card-calories { 
            margin: 20px; padding: 25px; border-radius: 30px; 
            background: var(--bg); box-shadow: 8px 8px 20px #d1d9e6, -8px -8px 20px #ffffff;
            text-align: center;
        }
        .progress-circle { font-size: 32px; font-weight: 800; color: var(--dark); margin: 10px 0; }
        .progress-bar { width: 100%; height: 12px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 15px; box-shadow: inset 2px 2px 5px #d1d9e6; }
        .progress-fill { width: 65%; height: 100%; background: var(--accent); border-radius: 10px; }

        /* Calendar Row */
        .calendar-row { display: flex; overflow-x: auto; padding: 10px 20px; gap: 15px; scrollbar-width: none; }
        .day-card { 
            min-width: 60px; padding: 15px 10px; border-radius: 20px; background: var(--bg);
            box-shadow: 4px 4px 10px #d1d9e6, -4px -4px 10px #ffffff;
            text-align: center; transition: 0.3s;
        }
        .day-card.active { background: var(--dark); color: white; }

        /* Food List */
        .section-title { padding: 0 25px; font-size: 18px; font-weight: 700; margin-top: 30px; }
        .food-item {
            margin: 15px 25px; padding: 15px; border-radius: 20px; background: var(--bg);
            box-shadow: 4px 4px 10px #d1d9e6, -4px -4px 10px #ffffff;
            display: flex; align-items: center; gap: 15px;
        }
        .food-img { width: 50px; height: 50px; border-radius: 12px; background: #ddd; object-fit: cover; }

        /* Camera Button */
        .cam-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; border-radius: 50%; background: var(--dark);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); color: white; border: none;
            font-size: 28px; display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <header class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">✕</button>
        <h2 style="margin: 0; font-weight: 800;">Mi Dieta</h2>
        <p style="font-size: 14px; color: #888;">Seguimiento nutricional</p>
    </header>

    <div class="card-calories">
        <div style="font-size: 14px; color: #888;">Calorías de hoy</div>
        <div class="progress-circle">1,250 <span style="font-size: 16px; color: #aaa;">/ 2,000 kcal</span></div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div style="display: flex; justify-content: space-around; margin-top: 20px; font-size: 12px;">
            <div><strong>45g</strong><br>Prot</div>
            <div><strong>120g</strong><br>Carbs</div>
            <div><strong>30g</strong><br>Grasas</div>
        </div>
    </div>

    <div class="calendar-row">
        <div class="day-card"><span>Lun</span><br><strong>06</strong></div>
        <div class="day-card active"><span>Mar</span><br><strong>07</strong></div>
        <div class="day-card"><span>Mié</span><br><strong>08</strong></div>
        <div class="day-card"><span>Jue</span><br><strong>09</strong></div>
        <div class="day-card"><span>Vie</span><br><strong>10</strong></div>
    </div>

    <h3 class="section-title">Comidas del día</h3>
    <div id="food-list">
        <div class="food-item">
            <div class="food-img">🥗</div>
            <div style="flex:1">
                <div style="font-weight: bold;">Ensalada Cesar</div>
                <div style="font-size: 12px; color: #888;">320 kcal • 12:30 PM</div>
            </div>
        </div>
    </div>

   <!-- Input oculto para abrir la cámara -->
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">
    <button class="cam-btn" onclick="abrirCamara()">📸</button>

    <!-- Pantalla de carga mientras la IA "mira" la foto -->
    <div id="loading-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(240,240,243,0.9); z-index:2000; justify-content:center; align-items:center; flex-direction:column;">
        <div style="font-size: 40px; animation: bounce 1s infinite;">🤖</div>
        <p style="font-weight: bold; margin-top: 10px;">Analizando macros...</p>
    </div>

    <script>
        const supabaseUrl = '[https://cpveuexgxwxjejurtwro.supabase.co](https://cpveuexgxwxjejurtwro.supabase.co)';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmV1ZXhneHd4amVqdXJ0d3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MTYxMzAsImV4cCI6MjA4MjE5MjEzMH0.I4FeC3dmtOXNqLWA-tRgxAb7JCe13HysOkqMGkXaUUc';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const cameraInput = document.getElementById('camera-input');
        const loadingOverlay = document.getElementById('loading-overlay');
        const foodList = document.getElementById('food-list');

        function abrirCamara() {
            cameraInput.click(); // Esto abre la cámara del móvil
        }

        cameraInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Mostrar pantalla de carga
            loadingOverlay.style.display = 'flex';

            // Convertir la imagen a Base64
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64String = reader.result.split(',')[1]; // Quitamos el encabezado

                try {
                    // Llamamos a la misma función del Chef, pero le pasamos la foto
                    const { data, error } = await supabaseClient.functions.invoke('chef-ia', {
                        body: { imagenBase64: base64String }
                    });

                    if (error) throw error;

                    // Agregar el nuevo platillo a la lista visualmente
                    agregarPlatilloALaLista(data);
                    
                    // Aquí en el futuro agregaremos el código SQL para guardarlo en la base de datos
                    console.log("Datos de la IA:", data);

                } catch (err) {
                    alert("Error analizando la comida: " + err.message);
                } finally {
                    // Ocultar carga y limpiar el input
                    loadingOverlay.style.display = 'none';
                    cameraInput.value = ''; 
                }
            };
        });

        function agregarPlatilloALaLista(datosA) {
            const nuevoDiv = document.createElement('div');
            nuevoDiv.classList.add('food-item');
            nuevoDiv.innerHTML = `
                <div class="food-img" style="display:flex; justify-content:center; align-items:center; font-size:24px;">${datosA.emoji || '🍽️'}</div>
                <div style="flex:1">
                    <div style="font-weight: bold;">${datosA.nombre_alimento || 'Comida'}</div>
                    <div style="font-size: 12px; color: #888;">${datosA.calorias || 0} kcal • Prot: ${datosA.proteinas}g • Carbs: ${datosA.carbohidratos}g</div>
                </div>
            `;
            // Lo ponemos al principio de la lista
            foodList.insertBefore(nuevoDiv, foodList.firstChild);
        }
    </script>
</body>
</html>
