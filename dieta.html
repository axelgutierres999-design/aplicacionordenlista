<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BioBalance - Salud y Dieta</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f0f0f3; --dark: #2c2c2e; --accent: #4caf50; --blue: #3498db; --error: #ff5252; }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 120px; color: var(--dark); }

        /* Header */
        .header { padding: 50px 20px 20px; text-align: center; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .back-btn { position: absolute; left: 20px; top: 50px; background: var(--bg); border: none; padding: 12px; border-radius: 50%; box-shadow: 4px 4px 10px #d1d9e6, -4px -4px 10px #ffffff; }

        /* Cards Estilo Neumórfico */
        .card { 
            margin: 15px 20px; padding: 20px; border-radius: 25px; 
            background: var(--bg); box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
        }

        /* Macros Grid */
        .macros-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .macro-item { text-align: center; }
        .macro-val { font-weight: 800; font-size: 16px; display: block; }
        .macro-label { font-size: 10px; color: #888; text-transform: uppercase; }

        /* Exercise Proposal Card */
        .exercise-card { background: linear-gradient(145deg, #ffffff, #e6e6e6); border-left: 5px solid var(--blue); }
        .exercise-title { font-size: 14px; font-weight: bold; color: var(--blue); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }

        /* List Items */
        .food-item {
            margin: 10px 20px; padding: 12px; border-radius: 18px; background: var(--bg);
            box-shadow: 4px 4px 8px #d1d9e6, -4px -4px 8px #ffffff;
            display: flex; align-items: center; gap: 12px;
        }
        .food-img { font-size: 22px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: #e9e9ed; border-radius: 12px; }

        /* UI Elements */
        .progress-bar { width: 100%; height: 10px; background: #e0e0e0; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .action-buttons { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .btn-round { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(240,240,243,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { width: 85%; background: var(--bg); padding: 25px; border-radius: 25px; box-shadow: 10px 10px 20px #d1d9e6; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 12px; background: var(--bg); box-shadow: inset 2px 2px 5px #d1d9e6; }
    </style>
</head>
<body>

    <header class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">✕</button>
        <h2 style="margin: 0; font-weight: 800;">Mi Nutrición AI</h2>
    </header>

    <!-- Panel de Calorías y Macros -->
    <div class="card">
        <div style="font-size: 13px; color: #888;">Consumo Diario</div>
        <div style="font-size: 28px; font-weight: 800;" id="total-calories">0 <span style="font-size: 14px; color: #aaa;">/ 2,000 kcal</span></div>
        <div class="progress-bar"><div class="progress-fill" id="bar-fill"></div></div>
        
        <div class="macros-grid">
            <div class="macro-item">
                <span class="macro-val" id="total-prot" style="color: #e67e22;">0g</span>
                <span class="macro-label">Proteína</span>
            </div>
            <div class="macro-item">
                <span class="macro-val" id="total-carbs" style="color: #3498db;">0g</span>
                <span class="macro-label">Carbs</span>
            </div>
            <div class="macro-item">
                <span class="macro-val" id="total-fats" style="color: #f1c40f;">0g</span>
                <span class="macro-label">Grasas</span>
            </div>
        </div>
    </div>

    <!-- Propuesta de Ejercicio -->
    <div class="card exercise-card" id="exercise-suggestion" style="display: none;">
        <div class="exercise-title">🏃‍♂️ Propuesta de Actividad</div>
        <p id="exercise-text" style="font-size: 13px; margin: 5px 0; line-height: 1.4; color: #555;">Calculando recomendación según tu ingesta...</p>
    </div>

    <h3 style="margin-left: 25px; font-size: 16px;">Registro de Hoy</h3>
    <div id="food-list"></div>

    <div class="action-buttons">
        <button class="btn-round" style="background: white;" onclick="document.getElementById('manual-modal').style.display='flex'">📝</button>
        <button class="btn-round" style="background: var(--dark); color: white;" onclick="document.getElementById('camera-input').click()">📸</button>
    </div>

    <!-- Modales e Inputs Ocultos -->
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">
    
    <div id="manual-modal" class="modal">
        <div class="modal-content">
            <h3>Registro Manual</h3>
            <input type="text" id="m-name" placeholder="Nombre del alimento">
            <input type="number" id="m-cal" placeholder="Calorías">
            <input type="number" id="m-prot" placeholder="Proteína (g)">
            <input type="number" id="m-carbs" placeholder="Carbohidratos (g)">
            <input type="number" id="m-fats" placeholder="Grasas (g)">
            <button onclick="guardarManual()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold; margin-top:10px;">Guardar</button>
            <button onclick="this.parentElement.parentElement.style.display='none'" style="width:100%; background:none; border:none; color:#888; margin-top:10px;">Cerrar</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://cpveuexgxwxjejurtwro.supabase.co';
        const supabaseKey = 'TU_KEY_AQUI'; // Usa la que ya tienes
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Estado Global
        let totales = { cal: 0, prot: 0, carbs: 0, fats: 0 };

        // 1. PROCESAMIENTO DE IMAGEN (IA)
        document.getElementById('camera-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Aquí mostrarías un loading...
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    // Llamamos a la función "chef-ia"
                    // Nota: Asegúrate que tu Edge Function devuelva: 
                    // { nombre_alimento, calorias, proteinas, carbohidratos, grasas, emoji, sugerencia_ejercicio }
                    const { data, error } = await supabase.functions.invoke('chef-ia', {
                        body: { imagenBase64: base64 }
                    });

                    if (error) throw error;
                    procesarNuevoRegistro(data);
                    
                } catch (err) {
                    alert("Error IA: " + err.message);
                }
            };
        });

        function guardarManual() {
            const data = {
                nombre_alimento: document.getElementById('m-name').value,
                calorias: parseInt(document.getElementById('m-cal').value) || 0,
                proteinas: parseFloat(document.getElementById('m-prot').value) || 0,
                carbohidratos: parseFloat(document.getElementById('m-carbs').value) || 0,
                grasas: parseFloat(document.getElementById('m-fats').value) || 0,
                emoji: '🍴',
                sugerencia_ejercicio: "Caminata ligera de 15 min para estabilizar glucosa." // Default manual
            };
            procesarNuevoRegistro(data);
            document.getElementById('manual-modal').style.display = 'none';
        }

        function procesarNuevoRegistro(item) {
            // Actualizar Totales
            totales.cal += item.calorias;
            totales.prot += item.proteinas;
            totales.carbs += item.carbohidratos;
            totales.fats += item.grasas;

            // Renderizar en lista
            const div = document.createElement('div');
            div.className = 'food-item';
            div.innerHTML = `
                <div class="food-img">${item.emoji || '🥗'}</div>
                <div style="flex:1">
                    <div style="font-weight:bold">${item.nombre_alimento}</div>
                    <div style="font-size:11px; color:#888;">
                        ${item.calorias} kcal • P: ${item.proteinas}g • C: ${item.carbohidratos}g • G: ${item.grasas}g
                    </div>
                </div>
            `;
            document.getElementById('food-list').prepend(div);

            // Actualizar UI General
            updateUI(item.sugerencia_ejercicio);
        }

        function updateUI(sugerencia) {
            // Actualizar Texto y Barra
            document.getElementById('total-calories').innerHTML = `${totales.cal.toLocaleString()} <span style="font-size: 14px; color: #aaa;">/ 2,000 kcal</span>`;
            document.getElementById('total-prot').innerText = totales.prot.toFixed(1) + 'g';
            document.getElementById('total-carbs').innerText = totales.carbs.toFixed(1) + 'g';
            document.getElementById('total-fats').innerText = totales.fats.toFixed(1) + 'g';

            const porc = (totales.cal / 2000) * 100;
            document.getElementById('bar-fill').style.width = `${Math.min(porc, 100)}%`;

            // Mostrar Sugerencia de Ejercicio
            if (sugerencia) {
                const card = document.getElementById('exercise-suggestion');
                card.style.display = 'block';
                document.getElementById('exercise-text').innerText = sugerencia;
            }
        }
    </script>
</body>
</html>
