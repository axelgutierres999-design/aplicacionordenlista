<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Salud y Dieta AI</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #f4f5f8; --dark: #1d1d1f; --accent: #000000; 
            --prot: #ff4d4d; --carb: #ff9f0a; --fat: #32ade6; 
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--dark); }

        /* Header */
        .header { padding: 50px 20px 20px; text-align: center; position: sticky; top: 0; background: rgba(244,245,248,0.9); backdrop-filter: blur(10px); z-index: 100; }
        
        /* Dashboard Totales */
        .card-calories { background: white; margin: 20px; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .progress-circle { font-size: 36px; font-weight: 800; margin: 10px 0; }
        .macros-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .macro-item { background: var(--bg); padding: 10px; border-radius: 15px; }
        .macro-val { font-weight: 800; font-size: 16px; display: block; }
        .macro-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px;}

        /* Lista de Alimentos (Estilo Cal AI) */
        .food-item { background: white; margin: 15px 20px; padding: 20px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .food-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .food-title { font-weight: 700; font-size: 16px; }
        .food-cal { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        
        /* Chips de Macros */
        .chips-container { display: flex; gap: 10px; }
        .macro-chip { flex: 1; padding: 10px; border-radius: 16px; border: 1px solid #eee; text-align: left; }
        .chip-label { font-size: 11px; color: #888; display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
        .chip-val { font-weight: 700; font-size: 14px; }

        /* Botones Flotantes */
        .action-buttons { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 1000; }
        .btn-round { width: 60px; height: 60px; border-radius: 30px; border: none; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.15); transition: transform 0.2s; }
        .btn-round:active { transform: scale(0.95); }
        .cam-btn { background: var(--accent); color: white; width: 80px; }
        .text-btn { background: white; color: var(--dark); }
        .coach-btn { background: #5856d6; color: white; }

        /* Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 2000; justify-content: center; align-items: flex-end; }
        .modal-content { background: white; width: 100%; padding: 30px; border-radius: 30px 30px 0 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 15px; background: var(--bg); outline: none; font-size: 16px; }
        .primary-btn { width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 15px; background: var(--accent); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Pantalla de Carga */
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { font-size: 50px; animation: spin 1.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="header">
        <h2 style="margin: 0; font-weight: 800;">Resumen Diario</h2>
    </header>

    <!-- Tarjeta Dashboard -->
    <div class="card-calories">
        <div style="font-size: 14px; color: #888;">Calorías Consumidas</div>
        <div class="progress-circle" id="total-calories">0 <span style="font-size: 16px; color: #aaa; font-weight: 500;">/ 2000 kcal</span></div>
        
        <div class="macros-grid">
            <div class="macro-item">
                <span class="macro-val" id="total-prot" style="color: var(--prot);">0g</span>
                <span class="macro-label">Proteína</span>
            </div>
            <div class="macro-item">
                <span class="macro-val" id="total-carbs" style="color: var(--carb);">0g</span>
                <span class="macro-label">Carbs</span>
            </div>
            <div class="macro-item">
                <span class="macro-val" id="total-fats" style="color: var(--fat);">0g</span>
                <span class="macro-label">Grasas</span>
            </div>
        </div>
    </div>

    <!-- Lista de Platillos -->
    <div id="food-list">
        <!-- Los items se cargarán aquí -->
    </div>

    <!-- Botones Flotantes -->
    <div class="action-buttons">
        <button class="btn-round text-btn" onclick="openModal('text-modal')">✍️</button>
        <button class="btn-round cam-btn" onclick="document.getElementById('camera-input').click()">📸</button>
        <button class="btn-round coach-btn" onclick="pedirConsejoCoach()">🧠</button>
    </div>

    <!-- Inputs Ocultos -->
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">

    <!-- Modal de Texto IA -->
    <div id="text-modal" class="modal" onclick="closeModal(event, 'text-modal')">
        <div class="modal-content">
            <h3 style="margin-top:0;">Buscar con IA</h3>
            <p style="font-size: 14px; color: #666;">Describe lo que comiste y su peso aproximado.</p>
            <input type="text" id="ai-food-name" placeholder="Ej: Dos rebanadas de pan con aguacate">
            <input type="text" id="ai-food-weight" placeholder="Peso o cantidad (Ej: 150g o 1 porción)">
            <button class="primary-btn" onclick="analizarTextoIA()">Analizar y Guardar</button>
        </div>
    </div>

    <!-- Modal Coach -->
    <div id="coach-modal" class="modal" onclick="closeModal(event, 'coach-modal')">
        <div class="modal-content">
            <h3 style="margin-top:0;">👨‍⚕️ Coach Metabólico</h3>
            <div id="coach-response" style="line-height: 1.5; color: #444; min-height: 100px;">
                Analizando tu ingesta del día...
            </div>
            <button class="primary-btn" onclick="document.getElementById('coach-modal').style.display='none'">Entendido</button>
        </div>
    </div>

    <!-- Overlay de Carga -->
    <div id="loading-overlay">
        <div class="spinner">⏳</div>
        <p style="font-weight: bold; margin-top: 20px;" id="loading-text">Analizando alimento...</p>
    </div>

<script>
    // 1. CONFIGURACIÓN SUPABASE (Nombre cambiado para evitar el "already declared")
    const urlDB = 'https://cpveuexgxwxjejurtwro.supabase.co';
    const keyDB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmV1ZXhneHd4amVqdXJ0d3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MTYxMzAsImV4cCI6MjA4MjE5MjEzMH0.I4FeC3dmtOXNqLWA-tRgxAb7JCe13HysOkqMGkXaUUc'; 
    
    // Usamos supabaseClient para que no choque con la palabra 'supabase' de la librería
    const supabaseClient = window.supabase.createClient(urlDB, keyDB);

    let totales = { cal: 0, prot: 0, carbs: 0, fats: 0 };
    let listaAlimentosHoy = []; 

    // 2. CARGA INICIAL
    window.onload = async () => {
        mostrarCarga(true, "Cargando tu día...");
        const hace24h = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
        
        try {
            const { data, error } = await supabaseClient
                .from('registros_dieta')
                .select('*')
                .gt('created_at', hace24h)
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (data) {
                document.getElementById('food-list').innerHTML = '';
                data.reverse().forEach(item => renderizarPlatillo(item));
            }
        } catch (err) {
            console.error("Error al cargar:", err);
        } finally {
            mostrarCarga(false);
        }
    };

    // 3. ANÁLISIS DE IMAGEN (📸)
    document.getElementById('camera-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        mostrarCarga(true, "La IA está analizando tu foto...");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            try {
                const { data, error } = await supabaseClient.functions.invoke('chef-ia', {
                    body: { tipo: 'imagen', imagenBase64: base64 }
                });
                if (error) throw error;
                await guardarEnBD(data);
            } catch (err) {
                alert("Error con la foto: " + err.message);
            } finally {
                mostrarCarga(false);
                document.getElementById('camera-input').value = ''; 
            }
        };
    });

    // 4. ANÁLISIS DE TEXTO (✍️)
    async function analizarTextoIA() {
        const nombre = document.getElementById('ai-food-name').value;
        const peso = document.getElementById('ai-food-weight').value;
        if (!nombre) return alert("Por favor ingresa qué comiste.");

        document.getElementById('text-modal').style.display = 'none';
        mostrarCarga(true, "Calculando macros...");

        try {
            const { data, error } = await supabaseClient.functions.invoke('chef-ia', {
                body: { tipo: 'texto', alimento: nombre, cantidad: peso }
            });
            if (error) throw error;
            await guardarEnBD(data);
            
            document.getElementById('ai-food-name').value = '';
            document.getElementById('ai-food-weight').value = '';
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            mostrarCarga(false);
        }
    }

    // 5. GUARDAR Y RENDERIZAR
    async function guardarEnBD(infoIA) {
        const nuevoRegistro = {
            nombre_alimento: infoIA.nombre_alimento,
            calorias: parseInt(infoIA.calorias) || 0,
            proteinas: parseFloat(infoIA.proteinas) || 0,
            carbohidratos: parseFloat(infoIA.carbohidratos) || 0,
            grasas: parseFloat(infoIA.grasas) || 0
        };

        const { data, error } = await supabaseClient
            .from('registros_dieta')
            .insert([nuevoRegistro])
            .select();

        if (error) {
            alert("Error al guardar: " + error.message);
        } else {
            renderizarPlatillo(data[0]);
        }
    }

    function renderizarPlatillo(item) {
        totales.cal += item.calorias;
        totales.prot += item.proteinas;
        totales.carbs += item.carbohidratos;
        totales.fats += item.grasas;
        listaAlimentosHoy.push(item.nombre_alimento);

        const div = document.createElement('div');
        div.className = 'food-item';
        div.innerHTML = `
            <div class="food-header">
                <div class="food-title">${item.nombre_alimento}</div>
                <div class="food-cal">🔥 ${item.calorias}</div>
            </div>
            <div class="chips-container">
                <div class="macro-chip">
                    <div class="chip-label"><span style="color:var(--prot)">●</span> Prot</div>
                    <div class="chip-val">${item.proteinas}g</div>
                </div>
                <div class="macro-chip">
                    <div class="chip-label"><span style="color:var(--carb)">●</span> Carb</div>
                    <div class="chip-val">${item.carbohidratos}g</div>
                </div>
                <div class="macro-chip">
                    <div class="chip-label"><span style="color:var(--fat)">●</span> Gras</div>
                    <div class="chip-val">${item.grasas}g</div>
                </div>
            </div>
        `;
        document.getElementById('food-list').prepend(div);
        actualizarUI();
    }

    function actualizarUI() {
        document.getElementById('total-calories').innerHTML = `${totales.cal} <span style="font-size: 16px; color: #aaa; font-weight:500;">/ 2000 kcal</span>`;
        document.getElementById('total-prot').innerText = totales.prot.toFixed(1) + 'g';
        document.getElementById('total-carbs').innerText = totales.carbs.toFixed(1) + 'g';
        document.getElementById('total-fats').innerText = totales.fats.toFixed(1) + 'g';
    }

    // 6. COACH METABÓLICO (🧠)
    async function pedirConsejoCoach() {
        if (listaAlimentosHoy.length === 0) return alert("Aún no has registrado comidas hoy.");
        
        document.getElementById('coach-modal').style.display = 'flex';
        document.getElementById('coach-response').innerHTML = "⏳ Analizando tu carga glucémica...";

        try {
            const { data, error } = await supabaseClient.functions.invoke('chef-ia', {
                body: { 
                    tipo: 'coach',
                    calorias: totales.cal, 
                    carbs: totales.carbs, 
                    alimentos: listaAlimentosHoy 
                }
            });
            
            if (error) throw error;
            document.getElementById('coach-response').innerHTML = data.recomendacion;
        } catch (err) {
            document.getElementById('coach-response').innerHTML = "Error: " + err.message;
        }
    }

    // 7. UTILIDADES DE INTERFAZ (Para que openModal funcione)
    function openModal(id) { 
        document.getElementById(id).style.display = 'flex'; 
    }
    
    function closeModal(e, id) { 
        if(e.target.id === id) document.getElementById(id).style.display = 'none'; 
    }
    
    function mostrarCarga(mostrar, texto = "") { 
        const overlay = document.getElementById('loading-overlay');
        if(overlay) {
            overlay.style.display = mostrar ? 'flex' : 'none';
            if(texto) document.getElementById('loading-text').innerText = texto;
        }
    }
</script>
</body>
</html>
