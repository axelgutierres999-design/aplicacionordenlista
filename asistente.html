<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chef IA - OrdenLista</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f0f0f3; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        .header-ia { padding: 40px 20px 20px; text-align: center; background: #f0f0f3; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .back-btn { position: absolute; left: 20px; top: 45px; background: #f0f0f3; border: none; padding: 10px; border-radius: 50%; box-shadow: 4px 4px 10px #d1d9e6, -4px -4px 10px #ffffff; cursor: pointer; }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .bubble { padding: 15px; border-radius: 20px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .user { align-self: flex-end; background: #000; color: #fff; box-shadow: 5px 5px 15px #d1d9e6; }
        .bot { align-self: flex-start; background: #f0f0f3; color: #333; box-shadow: 7px 7px 15px #d1d9e6, -7px -7px 15px #ffffff; }

        .input-area { padding: 20px; background: #f0f0f3; display: flex; gap: 10px; padding-bottom: 30px; }
        .input-ia { flex: 1; border: none; padding: 15px; border-radius: 15px; background: #f0f0f3; box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff; outline: none; }
        .send-btn { background: #000; color: white; border: none; width: 50px; height: 50px; border-radius: 15px; cursor: pointer; box-shadow: 4px 4px 10px #d1d9e6; }
        
        /* Animación de carga */
        .typing { font-style: italic; color: #888; font-size: 12px; margin-left: 10px; display: none; }
    </style>
</head>
<body>

    <header class="header-ia">
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <div style="font-size: 40px;">👨‍🍳</div>
        <h2 style="margin: 10px 0 0 0; font-weight: 800;">Chef Asistente IA</h2>
        <p style="font-size: 12px; color: #888;">Dietas, antojos y consejos gourmet</p>
    </header>

    <main id="chat-container">
        <div class="bubble bot">¡Hola Chef! Soy adrian tu asistente de OrdenLista. ¿Que antojo tienes hoy?</div>
    </main>

    <div id="typing-indicator" class="typing">un segundo estoy pensando..........</div>

    <div class="input-area">
        <input type="text" id="user-input" class="input-ia" placeholder="Ej: Quiero una hamburguesa sana...">
        <button class="send-btn" onclick="enviarMensaje()">➔</button>
    </div>

<script>
const supabaseUrl = 'https://cpveuexgxwxjejurtwro.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmV1ZXhneHd4amVqdXJ0d3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MTYxMzAsImV4cCI6MjA4MjE5MjEzMH0.I4FeC3dmtOXNqLWA-tRgxAb7JCe13HysOkqMGkXaUUc';

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const typingIndicator = document.getElementById('typing-indicator');
const sendBtn = document.querySelector('.send-btn');

async function enviarMensaje() {
    const text = userInput.value.trim();
    if (!text) return;

    appendMessage(text, 'user');
    userInput.value = '';

    typingIndicator.style.display = 'block';
    sendBtn.disabled = true;

    try {
        const { data, error } = await supabaseClient.functions.invoke('chef-ia', {
            body: { prompt: text }
        });

        typingIndicator.style.display = 'none';
        sendBtn.disabled = false;

        if (error) throw error;

        appendMessage(data.response || "No entendí bien tu pedido.", 'bot');

    } catch (err) {
        typingIndicator.style.display = 'none';
        sendBtn.disabled = false;

        appendMessage("Error: " + err.message, 'bot');
        console.error(err);
    }
}

function appendMessage(text, side) {
    const div = document.createElement('div');
    div.classList.add('bubble', side);
    div.style.whiteSpace = 'pre-wrap';
    div.innerText = text;
    chatContainer.appendChild(div);

    chatContainer.scrollTo({
        top: chatContainer.scrollHeight,
        behavior: 'smooth'
    });
}

userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') enviarMensaje();
});
</script>
</body>
</html>
