<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Recetario | Editorial</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #FDFCF8; /* Blanco hueso/papel */
            --dark: #2C302E; 
            --accent: #7C9885; /* Verde salvia elegante */
            --accent-light: #E8F0EA;
            --card: #FFFFFF; 
            --text-muted: #666666;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--dark); 
            font-family: 'Lora', serif; /* Fuente base elegante */
            padding: 20px; 
            margin: 0;
            line-height: 1.7; 
        }
        
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding-bottom: 60px;
        }

        /* Navegación y Cabecera */
        .nav-bar { 
            display: flex; 
            align-items: center; 
            margin-bottom: 40px; 
            padding-top: 10px;
        }
        
        .btn-back { 
            background: transparent; 
            color: var(--dark); 
            border: 1px solid #D1D1D1; 
            padding: 8px 20px; 
            border-radius: 30px; 
            text-decoration: none; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px; 
            font-weight: 500; 
            transition: all 0.3s ease; 
        }
        .btn-back:hover { 
            background: var(--dark); 
            color: #fff;
        }
        
        .page-title { 
            font-family: 'Playfair Display', serif;
            font-size: 42px; 
            font-weight: 700; 
            margin-bottom: 40px; 
            text-align: center; 
            color: var(--dark);
            letter-spacing: -0.5px;
        }

        /* Tarjetas de Receta */
        .recipe-card { 
            background: var(--card); 
            border-radius: 16px; 
            padding: 35px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            border: 1px solid rgba(0,0,0,0.04); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .recipe-card:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
        }
        
        .recipe-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            flex-wrap: wrap; 
            gap: 15px; 
        }
        
        .recipe-header h2 { 
            margin: 0; 
            font-family: 'Playfair Display', serif;
            font-size: 26px; 
            font-weight: 700; 
            color: var(--dark); 
            line-height: 1.2;
            flex: 1;
        }
        
        .tag { 
            background: var(--accent-light); 
            color: var(--accent); 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            white-space: nowrap;
        }

        /* Botón de Expansión Estético */
        .btn-toggle {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 15px;
            padding: 15px 0 0 0;
            margin-top: 15px;
            border-top: 1px dashed #E0E0E0;
            cursor: pointer;
            outline: none;
        }
        .btn-toggle::after {
            content: ' ↓ Ver receta completa';
            color: var(--accent);
            font-weight: 600;
        }
        .recipe-card.active .btn-toggle::after {
            content: ' ↑ Ocultar receta';
        }

        /* Contenido Oculto de la Receta */
        .recipe-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0, 1, 0, 1);
            opacity: 0;
        }

        .recipe-card.active .recipe-content {
            max-height: 2000px; /* Suficiente para que no corte texto largo */
            transition: max-height 0.8s ease-in-out, opacity 0.5s ease-in;
            opacity: 1;
            margin-top: 30px;
        }

        /* Layout tipo Libro: Dos columnas en Desktop */
        .recipe-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        @media (max-width: 600px) {
            .recipe-grid {
                grid-template-columns: 1fr; /* Una columna en móviles */
                gap: 20px;
            }
        }
        
        .recipe-section h3 { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 12px; 
            text-transform: uppercase; 
            color: var(--text-muted); 
            margin: 0 0 15px 0; 
            letter-spacing: 1.5px; 
            font-weight: 700; 
            border-bottom: 1px solid #E0E0E0;
            padding-bottom: 8px;
        }
        
        .recipe-section p { 
            margin: 0; 
            color: var(--dark); 
            font-size: 16px; 
            white-space: pre-line; /* Respeta los saltos de línea de la BD */
        }
        
        .ingredients-list {
            margin: 0;
            padding-left: 20px;
            color: var(--dark);
            font-size: 16px;
        }
        
        .ingredients-list li {
            margin-bottom: 10px;
            padding-left: 5px;
        }
        .ingredients-list li::marker {
            color: var(--accent);
        }

        /* Pie de Tarjeta y Botones */
        .recipe-footer { 
            margin-top: 30px; 
            display: flex;
            justify-content: flex-end;
        }
        
        .btn-video { 
            background: #FAFAFA; 
            color: #D32F2F; 
            padding: 10px 24px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px; 
            font-weight: 600; 
            border: 1px solid #EEEEEE;
            display: inline-flex; 
            align-items: center;
            gap: 8px;
            transition: all 0.2s; 
        }
        
        .btn-video:hover { 
            background: #FFEBEE; 
            border-color: #FFCDD2;
        }
        
        .status-msg {
            text-align: center;
            color: var(--text-muted);
            font-size: 16px;
            margin-top: 60px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="dieta.html" class="btn-back">← Volver a Mi Dieta</a>
        </div>
        
        <h1 class="page-title">Mi Recetario</h1>
        
        <div id="lista-recetas">
            <div class="status-msg">Abriendo el libro de recetas...</div>
        </div>
    </div>

    <script>
        const urlDB = 'https://cpveuexgxwxjejurtwro.supabase.co';
        const keyDB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmV1ZXhneHd4amVqdXJ0d3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MTYxMzAsImV4cCI6MjA4MjE5MjEzMH0.I4FeC3dmtOXNqLWA-tRgxAb7JCe13HysOkqMGkXaUUc'; 
        
        const supabaseClient = window.supabase.createClient(urlDB, keyDB);

        // Función para alternar la visualización de la receta sin que salte la página
        function toggleReceta(btn) {
            const card = btn.closest('.recipe-card');
            card.classList.toggle('active');
        }

        async function cargarRecetas() {
            try {
                const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
                
                if (authError || !user) {
                    document.getElementById('lista-recetas').innerHTML = '<div class="status-msg">Por favor, inicia sesión para ver tus recetas guardadas.</div>';
                    return;
                }

                const { data, error } = await supabaseClient
                    .from('recetario_usuario')
                    .select('*')
                    .order('creado_at', { ascending: false });

                if (error) throw error;

                const container = document.getElementById('lista-recetas');
                
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="status-msg">Tu recetario está en blanco. ¡Escanea un platillo para empezar a cocinar!</div>';
                    return;
                }

                container.innerHTML = data.map(r => {
                    const listaIngredientes = r.ingredientes.split(',').map(ing => `<li>${ing.trim()}</li>`).join('');

                    return `
                    <div class="recipe-card">
                        <div class="recipe-header">
                            <h2>${r.nombre_platillo}</h2>
                            <span class="tag">${r.tipo_receta}</span>
                        </div>
                        
                        <button class="btn-toggle" onclick="toggleReceta(this)">Preparación e Ingredientes</button>
                        
                        <div class="recipe-content">
                            <div class="recipe-grid">
                                <div class="recipe-section">
                                    <h3>🍽️ Ingredientes</h3>
                                    <ul class="ingredients-list">${listaIngredientes}</ul>
                                </div>
                                <div class="recipe-section">
                                    <h3>👨‍🍳 Instrucciones</h3>
                                    <p>${r.instrucciones}</p>
                                </div>
                            </div>
                            
                            ${r.link_busqueda ? `
                            <div class="recipe-footer">
                                <a href="${r.link_busqueda}" target="_blank" class="btn-video" onclick="event.stopPropagation()">
                                    ▶ Ver Video Tutorial
                                </a>
                            </div>` : ''}
                        </div>
                    </div>
                    `;
                }).join('');
                
            } catch (err) {
                console.error(err);
                document.getElementById('lista-recetas').innerHTML = '<div class="status-msg" style="color: #D32F2F;">Ocurrió un error al cargar las recetas. Intenta actualizar la página.</div>';
            }
        }
        
        cargarRecetas();
    </script>
</body>
</html>
