<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Recetario AI</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f4f5f8; font-family: sans-serif; padding: 20px; }
        .recipe-card { background: white; padding: 20px; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .tag { background: #e0fdf5; color: #10ad93; padding: 5px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        h2 { margin: 10px 0; font-size: 18px; }
        .btn-back { background: black; color: white; padding: 10px 20px; border-radius: 15px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="dieta.html" class="btn-back">⬅ Volver a Dieta</a>
    <h1>Recetario </h1>
    <div id="lista-recetas">Cargando tus recetas...</div>

    <script>
        const urlDB = 'https://cpveuexgxwxjejurtwro.supabase.co';
        const keyDB = 'eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmV1ZXhneHd4amVqdXJ0d3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MTYxMzAsImV4cCI6MjA4MjE5MjEzMH0'; 
        const supabase = window.supabase.createClient(urlDB, keyDB);

        async function cargarRecetas() {
            const { data: { user } } = await supabase.auth.getUser();
            const { data, error } = await supabase.from('recetario_usuario').select('*').order('creado_at', { ascending: false });

            const container = document.getElementById('lista-recetas');
            if (data.length === 0) {
                container.innerHTML = "<p>Aún no has guardado recetas.</p>";
                return;
            }

            container.innerHTML = data.map(r => `
                <div class="recipe-card">
                    <span class="tag">${r.tipo_receta}</span>
                    <h2>${r.nombre_platillo}</h2>
                    <p><b>Ingredientes:</b> ${r.ingredientes}</p>
                    <p><b>Instrucciones:</b> ${r.instrucciones}</p>
                    ${r.link_busqueda ? `<a href="${r.link_busqueda}" target="_blank" style="color:#ff0000; font-size:12px;">Ver Video de Referencia</a>` : ''}
                </div>
            `).join('');
        }
        cargarRecetas();
    </script>
</body>
</html>
