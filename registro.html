<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bienvenido - Registro Premium</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #eef0f3;
            --skin-color: #ffaa5e; /* Color de piel del chef de tu imagen */
            --hat-color: #ffffff;
            --outline: 3px solid #000; /* Borde grueso estilo dibujo */
        }
        
        body {
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .registro-card {
            width: 100%;
            max-width: 400px;
            padding: 30px 30px 40px;
            background: #eef0f3;
            border-radius: 40px;
            text-align: center;
            box-shadow: 20px 20px 60px #caced1, -20px -20px 60px #ffffff;
            transition: all 0.5s ease;
        }

        /* --- DIBUJO DEL CHEF EN CSS --- */
        .avatar-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            background: #8ecae6; /* Fondo azul claro para resaltar */
            border-radius: 50%;
            border: var(--outline);
            position: relative;
            overflow: hidden; /* Oculta lo que sale del círculo (las manos) */
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.1), 8px 8px 16px #caced1, -8px -8px 16px #ffffff;
        }

        .chef-body {
            position: absolute; width: 90px; height: 50px;
            background: white; border: var(--outline);
            border-radius: 40px 40px 0 0;
            bottom: -5px; left: 50%; transform: translateX(-50%);
        }

        .chef-scarf {
            position: absolute; width: 40px; height: 20px;
            background: #d62828; /* Rojo de la bufanda */
            border: var(--outline); border-radius: 10px;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 2;
        }
        
        .chef-scarf-tail {
            position: absolute; width: 15px; height: 30px;
            background: #d62828; border: var(--outline); border-radius: 5px;
            bottom: 5px; left: 50%; z-index: 3;
        }

        .chef-head {
            position: absolute; width: 70px; height: 55px;
            background: var(--skin-color); border: var(--outline);
            border-radius: 35px; top: 45px; left: 50%; transform: translateX(-50%);
            z-index: 4; transition: all 0.3s ease;
        }

        .ear {
            position: absolute; width: 20px; height: 20px;
            background: var(--skin-color); border: var(--outline);
            border-radius: 50%; top: 60px; z-index: 3;
        }
        .ear.left { left: 15px; }
        .ear.right { right: 15px; }

        .chef-hat-base {
            position: absolute; width: 80px; height: 25px;
            background: var(--hat-color); border: var(--outline);
            border-radius: 10px; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 5;
        }

        .chef-hat-top {
            position: absolute; width: 90px; height: 50px;
            background: var(--hat-color); border: var(--outline);
            border-radius: 30px 30px 10px 10px; top: -5px; left: 50%; transform: translateX(-50%);
            z-index: 4;
        }

        /* Rasgos faciales */
        .eyes {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: center; gap: 20px;
            transition: transform 0.2s ease;
        }
        .eye { width: 6px; height: 6px; background: #000; border-radius: 50%; }

        .mustache {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            display: flex; justify-content: center; z-index: 5;
            transition: transform 0.2s ease;
        }
        .stache-part {
            width: 25px; height: 12px; background: #222;
        }
        .stache-left { border-radius: 15px 0 15px 15px; transform: rotate(-10deg) translateY(2px); margin-right: -2px;}
        .stache-right { border-radius: 0 15px 15px 15px; transform: rotate(10deg) translateY(2px); margin-left: -2px;}

        /* Manos para la animación */
        .hands {
            position: absolute; bottom: -50px; width: 100%; height: 100%; z-index: 10;
        }
        .hand {
            position: absolute; width: 35px; height: 45px;
            background: var(--skin-color); border: var(--outline);
            border-radius: 20px; bottom: -60px; /* Escondidas por defecto */
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .hand.left { left: 15px; }
        .hand.right { right: 15px; }


        /* --- ESTADOS DE ANIMACIÓN --- */
        /* Escribiendo email/nombre (Mira abajo) */
        .avatar-container.look-down .eyes { transform: translateY(4px); }
        .avatar-container.look-down .mustache { transform: translateX(-50%) translateY(2px); }

        /* Contraseña (Se tapa los ojos) */
        .avatar-container.cover-eyes .hand { bottom: 35px; }
        
        /* Ver contraseña (Espía con un ojo) */
        .avatar-container.peek .hand.left { bottom: 15px; transform: rotate(-20deg) translateX(-10px); }
        .avatar-container.peek .hand.right { bottom: 35px; }


        /* --- RESTO DE TU ESTILO --- */
        h1 { color: #000; font-size: 26px; margin-bottom: 5px; font-weight: 800; }
        h1 + p { color: #888; font-size: 13px; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: left; position: relative; }
        .input-group label {
            display: block; margin-left: 15px; margin-bottom: 8px;
            font-size: 11px; font-weight: 700; color: #555;
            text-transform: uppercase; letter-spacing: 1px;
        }

        input {
            width: 100%; padding: 18px 20px; border-radius: 18px;
            border: none; background: #eef0f3; color: #333;
            font-size: 16px; outline: none; box-sizing: border-box;
            box-shadow: inset 6px 6px 12px #caced1, inset -6px -6px 12px #ffffff;
            transition: 0.3s;
        }
        input:focus { box-shadow: inset 2px 2px 5px #caced1, inset -2px -2px 5px #ffffff; }
        
        /* Ajuste para el botón de ojito */
        #reg-pass { padding-right: 50px; } 

        .btn-toggle-pass {
            position: absolute; right: 15px; top: 38px;
            background: none; border: none; font-size: 18px;
            cursor: pointer; color: #888; outline: none;
            padding: 5px; border-radius: 50%; transition: 0.2s;
        }
        .btn-toggle-pass:active { transform: scale(0.8); }

        .btn-registrar {
            width: 100%; background: #000; color: white;
            border: none; padding: 18px; border-radius: 18px;
            font-weight: 700; font-size: 16px; margin-top: 10px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: 0.2s;
        }
        .btn-registrar:active { transform: scale(0.97); }
        .btn-registrar:disabled { background: #555; cursor: not-allowed; }

        .footer-text { margin-top: 25px; font-size: 12px; color: #888; }
        .login-link { 
            margin-top: 15px; display: block; font-size: 14px; 
            color: #000; text-decoration: none; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="registro-card">
        
        <div class="avatar-container" id="chef-avatar">
            <div class="chef-hat-top"></div>
            <div class="chef-hat-base"></div>
            <div class="ear left"></div>
            <div class="ear right"></div>
            
            <div class="chef-head">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mustache">
                    <div class="stache-part stache-left"></div>
                    <div class="stache-part stache-right"></div>
                </div>
            </div>
            
            <div class="chef-body"></div>
            <div class="chef-scarf"></div>
            <div class="chef-scarf-tail"></div>
            
            <div class="hands">
                <div class="hand left"></div>
                <div class="hand right"></div>
            </div>
        </div>

        <h1>Bienvenido</h1>
        <p>Crea tu cuenta VIP para explorar los mejores sabores.</p>
        
        <div class="input-group">
            <label>Nombre Completo</label>
            <input type="text" id="reg-nombre" placeholder="Ej. Juan Pérez">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="reg-correo" placeholder="tu@correo.com">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres">
            <button type="button" class="btn-toggle-pass" id="btnTogglePass" title="Mostrar/Ocultar contraseña">👁️</button>
        </div>
        
        <button class="btn-registrar" id="btnRegistro" onclick="registrarUsuario()">Crear Cuenta</button>

        <a href="login.html" class="login-link">¿Ya tienes cuenta? Inicia sesión</a>
        <p class="footer-text">Al continuar, aceptas nuestros términos.</p>
    </div>

    <script>
        // --- ANIMACIÓN DEL CHEF ---
        const chefAvatar = document.getElementById('chef-avatar');
        const inputsText = document.querySelectorAll('#reg-nombre, #reg-correo');
        const passInput = document.getElementById('reg-pass');
        const btnTogglePass = document.getElementById('btnTogglePass');

        // 1. Mirar abajo al escribir texto normal
        inputsText.forEach(input => {
            input.addEventListener('focus', () => chefAvatar.classList.add('look-down'));
            input.addEventListener('blur', () => chefAvatar.classList.remove('look-down'));
        });

        // 2. Taparse los ojos al escribir contraseña
        passInput.addEventListener('focus', () => {
            if (passInput.type === 'password') {
                chefAvatar.classList.add('cover-eyes');
            } else {
                chefAvatar.classList.add('peek');
            }
        });
        
        passInput.addEventListener('blur', () => {
            chefAvatar.classList.remove('cover-eyes', 'peek');
        });

        // 3. Lógica del botón Mostrar/Ocultar (El ojito)
        btnTogglePass.addEventListener('click', () => {
            if (passInput.type === 'password') {
                passInput.type = 'text'; // Muestra la contraseña
                btnTogglePass.textContent = '🙈'; // Cambia el icono
                
                // Si el input está seleccionado, cambia la animación a "espiar"
                if (document.activeElement === passInput) {
                    chefAvatar.classList.remove('cover-eyes');
                    chefAvatar.classList.add('peek');
                }
            } else {
                passInput.type = 'password'; // Oculta la contraseña
                btnTogglePass.textContent = '👁️'; // Cambia el icono
                
                // Si el input está seleccionado, vuelve a tapar los dos ojos
                if (document.activeElement === passInput) {
                    chefAvatar.classList.remove('peek');
                    chefAvatar.classList.add('cover-eyes');
                }
            }
        });

        // --- LÓGICA DE SUPABASE (Inalterada) ---
        const _supabaseUrl = "https://cpveuexgxwxjejurtwro.supabase.co";
        const _supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdmV1ZXhneHd4amVqdXJ0d3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MTYxMzAsImV4cCI6MjA4MjE5MjEzMH0.I4FeC3dmtOXNqLWA-tRgxAb7JCe13HysOkqMGkXaUUc";
        const supabaseApp = window.supabase.createClient(_supabaseUrl, _supabaseKey);
        window.supabaseClient = supabaseApp;

        async function registrarUsuario() {
            const nombre = document.getElementById('reg-nombre').value.trim();
            const correo = document.getElementById('reg-correo').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const btn = document.getElementById('btnRegistro');

            if (!nombre || !correo || pass.length < 6) {
                return alert("Por favor, llena todos los campos. La contraseña debe tener al menos 6 caracteres.");
            }

            btn.textContent = "Procesando...";
            btn.disabled = true;

            try {
                const { data, error } = await supabaseApp.auth.signUp({
                    email: correo,
                    password: pass,
                    options: { data: { nombre: nombre } }
                });

                if (error) throw error;

                alert("¡Registro exitoso! Ya puedes disfrutar de la experiencia.");
                
                document.querySelector('.registro-card').style.transform = "scale(0.9)";
                document.querySelector('.registro-card').style.opacity = "0";

                setTimeout(() => { window.location.href = 'index.html'; }, 500);

            } catch (err) {
                let msg = "Error al registrar: " + err.message;
                if (err.message.includes("already registered")) {
                    msg = "Este correo ya está registrado. Intenta iniciar sesión.";
                }
                alert(msg);
                btn.textContent = "Crear Cuenta";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
