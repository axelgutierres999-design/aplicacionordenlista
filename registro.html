<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Registro Premium</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

:root{
    --bg:#eef0f3;
    --skin:#f6b26b;
    --dark:#111;
    --red:#d62828;
}

body{
    margin:0;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Segoe UI';
    padding:20px;
}

/* CARD */

.registro-card{
    width:100%;
    max-width:400px;
    padding:35px 30px;
    border-radius:35px;
    background:#eef0f3;
    box-shadow:20px 20px 60px #caced1,-20px -20px 60px #fff;
    text-align:center;
    animation:entrada 0.9s cubic-bezier(.175,.885,.32,1.275);
}

@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(40px) scale(.92);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* CHEF */

.avatar{
    width:150px;
    height:150px;
    margin:auto;
    position:relative;
    border-radius:50%;
    background:#fff;
    overflow:hidden;
    box-shadow:10px 10px 25px #caced1,-10px -10px 25px #fff;
}

/* Gorro real */

.hat-top{
    width:105px;
    height:55px;
    background:white;
    border-radius:35px 35px 18px 18px;
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
}

.hat-band{
    width:90px;
    height:15px;
    background:#111;
    position:absolute;
    top:42px;
    left:50%;
    transform:translateX(-50%);
}

/* Cara */

.face{
    width:80px;
    height:80px;
    background:var(--skin);
    border-radius:50%;
    position:absolute;
    top:48px;
    left:50%;
    transform:translateX(-50%);
}

/* Orejas */

.ear{
    width:16px;
    height:22px;
    background:var(--skin);
    border-radius:50%;
    position:absolute;
    top:70px;
}

.ear.left{ left:26px; }
.ear.right{ right:26px; }

/* Ojos */

.eyes{
    position:absolute;
    top:24px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:18px;
    transition:.2s;
}

.eye{
    width:8px;
    height:8px;
    background:black;
    border-radius:50%;
}

/* Bigote exacto */

.mustache{
    position:absolute;
    top:45px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:2px;
    transition:.2s;
}

.stache{
    width:22px;
    height:12px;
    background:#111;
}

.stache.left{
    border-radius:20px 0 20px 20px;
    transform:rotate(-10deg);
}

.stache.right{
    border-radius:0 20px 20px 20px;
    transform:rotate(10deg);
}

/* Cuello */

.tie{
    width:12px;
    height:35px;
    background:var(--red);
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    clip-path:polygon(50% 0%,100% 30%,70% 100%,30% 100%,0% 30%);
}

/* Manos cartoon */

.hand{
    width:34px;
    height:34px;
    background:var(--skin);
    border-radius:50%;
    position:absolute;
    bottom:-35px;
    transition:.55s cubic-bezier(.175,.885,.32,1.275);
}

.hand.left{ left:15px; }
.hand.right{ right:15px; }

/* Animaciones */

.avatar.look-down .eyes{
    transform:translate(-50%,5px);
}

.avatar.look-down .mustache{
    transform:translate(-50%,3px);
}

.avatar.cover-eyes .hand.left{
    bottom:55px;
    transform:rotate(25deg);
}

.avatar.cover-eyes .hand.right{
    bottom:55px;
    transform:rotate(-25deg);
}

.avatar.peek .hand.left{
    bottom:20px;
    transform:rotate(-25deg);
}

.avatar.peek .hand.right{
    bottom:55px;
}

/* Inputs */

h1{
    font-size:26px;
    margin-top:20px;
}

p{
    color:#777;
    font-size:14px;
}

.input-group{
    margin-bottom:18px;
    text-align:left;
    position:relative;
}

label{
    display:block;
    margin-left:12px;
    margin-bottom:8px;
    font-size:11px;
    font-weight:700;
}

input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#eef0f3;
    box-shadow:inset 6px 6px 12px #caced1,inset -6px -6px 12px #fff;
    font-size:16px;
    outline:none;
    box-sizing:border-box;
}

#reg-pass{
    padding-right:45px;
}

.toggle{
    position:absolute;
    right:15px;
    top:38px;
    border:none;
    background:none;
    font-size:18px;
    cursor:pointer;
    color:#666;
}

/* Botón */

.btn-registrar{
    width:100%;
    background:black;
    color:white;
    border:none;
    padding:18px;
    border-radius:18px;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
    transition:.2s;
}

.btn-registrar:active{
    transform:scale(.97);
}

</style>
</head>
<body>

<div class="registro-card">

<div class="avatar" id="chef">

<div class="hat-top"></div>
<div class="hat-band"></div>

<div class="ear left"></div>
<div class="ear right"></div>

<div class="face">

<div class="eyes">
<div class="eye"></div>
<div class="eye"></div>
</div>

<div class="mustache">
<div class="stache left"></div>
<div class="stache right"></div>
</div>

</div>

<div class="tie"></div>

<div class="hand left"></div>
<div class="hand right"></div>

</div>

<h1>Bienvenido</h1>
<p>Crea tu cuenta VIP para explorar sabores.</p>

<div class="input-group">
<label>Nombre Completo</label>
<input type="text" id="reg-nombre">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="reg-correo">
</div>

<div class="input-group">
<label>Contraseña</label>
<input type="password" id="reg-pass">
<button class="toggle" id="togglePass">◉</button>
</div>

<button class="btn-registrar" id="btnRegistro" onclick="registrarUsuario()">Crear Cuenta</button>

</div>

<script>

const chef=document.getElementById('chef');
const textInputs=document.querySelectorAll('#reg-nombre,#reg-correo');
const pass=document.getElementById('reg-pass');
const toggle=document.getElementById('togglePass');

textInputs.forEach(input=>{

input.addEventListener('focus',()=>{
chef.classList.add('look-down');
});

input.addEventListener('blur',()=>{
chef.classList.remove('look-down');
});

input.addEventListener('input',()=>{

let move=Math.min(input.value.length*2,12);

document.querySelector('.eyes').style.transform=
`translate(calc(-50% + ${move}px),5px)`;

document.querySelector('.mustache').style.transform=
`translate(calc(-50% + ${move}px),3px)`;

});

});

pass.addEventListener('focus',()=>{
if(pass.type==="password"){
chef.classList.add('cover-eyes');
}else{
chef.classList.add('peek');
}
});

pass.addEventListener('blur',()=>{
chef.classList.remove('cover-eyes','peek');
});

toggle.addEventListener('click',()=>{

if(pass.type==="password"){
pass.type="text";
chef.classList.remove('cover-eyes');
chef.classList.add('peek');
}else{
pass.type="password";
chef.classList.remove('peek');
chef.classList.add('cover-eyes');
}

});

/* TU SUPABASE */

const _supabaseUrl="https://cpveuexgxwxjejurtwro.supabase.co";
const _supabaseKey="TU_KEY";
const supabaseApp=window.supabase.createClient(_supabaseUrl,_supabaseKey);

async function registrarUsuario(){

const nombre=document.getElementById('reg-nombre').value.trim();
const correo=document.getElementById('reg-correo').value.trim();
const passw=document.getElementById('reg-pass').value;
const btn=document.getElementById('btnRegistro');

if(!nombre || !correo || passw.length<6){
return alert("Completa correctamente los campos");
}

btn.textContent="Procesando...";
btn.disabled=true;

try{

const {error}=await supabaseApp.auth.signUp({
email:correo,
password:passw,
options:{data:{nombre:nombre}}
});

if(error) throw error;

document.querySelector('.registro-card').style.transform="scale(.92)";
document.querySelector('.registro-card').style.opacity="0";

setTimeout(()=>{
window.location.href='index.html';
},500);

}catch(err){

alert(err.message);
btn.textContent="Crear Cuenta";
btn.disabled=false;

}

}

</script>

</body>
</html>
