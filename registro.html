<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Premium</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root{
    --bg:#eef0f3;
    --skin:#f6b26b;
}

body{
    margin:0;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:'Segoe UI';
}

.registro-card{
    width:380px;
    padding:35px;
    border-radius:35px;
    background:#eef0f3;
    box-shadow:20px 20px 60px #caced1,-20px -20px 60px #fff;
    text-align:center;
}

.avatar{
    width:140px;
    height:140px;
    margin:auto;
    position:relative;
    border-radius:50%;
    background:#fff;
    overflow:hidden;
    box-shadow:8px 8px 20px #caced1,-8px -8px 20px #fff;
}

/* Cara */
.face{
    width:80px;
    height:80px;
    background:var(--skin);
    border-radius:50%;
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
}

/* Gorro */
.hat{
    width:100px;
    height:55px;
    background:white;
    border-radius:40px 40px 10px 10px;
    position:absolute;
    top:5px;
    left:50%;
    transform:translateX(-50%);
}

/* Ojos */
.eyes{
    position:absolute;
    top:28px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:18px;
    transition:0.2s;
}

.eye{
    width:8px;
    height:8px;
    background:black;
    border-radius:50%;
}

/* Bigote */
.mustache{
    position:absolute;
    top:48px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:4px;
    transition:0.2s;
}

.stache{
    width:20px;
    height:10px;
    background:black;
    border-radius:20px;
}

/* Manos */
.hand{
    width:35px;
    height:35px;
    background:var(--skin);
    border-radius:50%;
    position:absolute;
    bottom:-40px;
    transition:0.5s cubic-bezier(.175,.885,.32,1.275);
}

.hand.left{
    left:15px;
}

.hand.right{
    right:15px;
}

/* Estados */

.avatar.look-down .eyes{
    transform:translate(-50%,5px);
}

.avatar.look-down .mustache{
    transform:translate(-50%,3px);
}

.avatar.cover-eyes .hand.left{
    bottom:50px;
    transform:rotate(20deg);
}

.avatar.cover-eyes .hand.right{
    bottom:50px;
    transform:rotate(-20deg);
}

.avatar.peek .hand.left{
    bottom:20px;
    transform:rotate(-25deg);
}

.avatar.peek .hand.right{
    bottom:50px;
}

/* Inputs */

.input-group{
    margin-bottom:18px;
    text-align:left;
    position:relative;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:12px;
    font-weight:700;
}

input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#eef0f3;
    box-shadow:inset 6px 6px 12px #caced1,inset -6px -6px 12px #fff;
    font-size:16px;
    outline:none;
}

#reg-pass{
    padding-right:50px;
}

.toggle{
    position:absolute;
    right:15px;
    top:38px;
    border:none;
    background:none;
    font-size:18px;
    cursor:pointer;
}

.btn-registrar{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:black;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
}

</style>
</head>
<body>

<div class="registro-card">

<div class="avatar" id="chef">

<div class="hat"></div>

<div class="face">

<div class="eyes">
<div class="eye"></div>
<div class="eye"></div>
</div>

<div class="mustache">
<div class="stache"></div>
<div class="stache"></div>
</div>

</div>

<div class="hand left"></div>
<div class="hand right"></div>

</div>

<h2>Bienvenido</h2>

<div class="input-group">
<label>Nombre</label>
<input type="text" id="reg-nombre">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="reg-correo">
</div>

<div class="input-group">
<label>Contraseña</label>
<input type="password" id="reg-pass">
<button class="toggle" id="togglePass">👁️</button>
</div>

<button class="btn-registrar">Crear Cuenta</button>

</div>

<script>

const chef = document.getElementById('chef');
const textInputs = document.querySelectorAll('#reg-nombre,#reg-correo');
const pass = document.getElementById('reg-pass');
const toggle = document.getElementById('togglePass');

textInputs.forEach(input=>{

input.addEventListener('focus',()=>{
chef.classList.add('look-down');
});

input.addEventListener('blur',()=>{
chef.classList.remove('look-down');
});

input.addEventListener('input',()=>{

let move=Math.min(input.value.length*2,12);

document.querySelector('.eyes').style.transform=
`translate(calc(-50% + ${move}px),5px)`;

document.querySelector('.mustache').style.transform=
`translate(calc(-50% + ${move}px),3px)`;

});

});

pass.addEventListener('focus',()=>{

if(pass.type==="password"){
chef.classList.add('cover-eyes');
}else{
chef.classList.add('peek');
}

});

pass.addEventListener('blur',()=>{
chef.classList.remove('cover-eyes','peek');
});

toggle.addEventListener('click',()=>{

if(pass.type==="password"){
pass.type="text";
toggle.textContent="🙈";

chef.classList.remove('cover-eyes');
chef.classList.add('peek');

}else{

pass.type="password";
toggle.textContent="👁️";

chef.classList.remove('peek');
chef.classList.add('cover-eyes');

}

});

</script>

</body>
</html>
